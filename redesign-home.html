<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Budget Tracker — UI Redesign Draft</title>
<style>
  :root {
    --bg: #070b14;
    --card: linear-gradient(180deg, #111a2c 0%, #0b1120 100%);
    --card-border: rgba(148,163,184,.14);
    --ink: #eef2f8;
    --ink-2: #8b96a8;
    --ink-3: #5b6577;
    --accent-a: #3987e5;
    --accent-b: #22d3ee;
    --good: #34d399;
    --bad: #f87171;
    --chip-bg: rgba(148,163,184,.08);
    /* bill-type colors (CVD-validated set) */
    --t-loan: #d95926;
    --t-cc: #3987e5;
    --t-sub: #d55181;
    --t-bills: #9085e9;
    --t-inv: #199e70;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-variant-numeric: tabular-nums;
  }
  .glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(600px 300px at 80% -5%, rgba(57,135,229,.18), transparent 70%),
      radial-gradient(500px 260px at 10% 0%, rgba(34,211,238,.10), transparent 70%);
  }
  .wrap { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 20px 18px 40px; }

  /* ── Header ── */
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .brand h1 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
  .brand h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .brand .sub { font-size: 12px; color: var(--ink-2); margin-top: 3px; }
  .btn-new {
    border: 0; cursor: pointer; color: #04121f; font-weight: 700; font-size: 13px;
    padding: 10px 16px; border-radius: 8px; white-space: nowrap;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 4px 24px rgba(34,211,238,.25);
  }
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 14px 0 22px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ink-2); background: var(--chip-bg);
    border: 1px solid var(--card-border); padding: 5px 11px; border-radius: 6px;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 99px; background: var(--good); box-shadow: 0 0 8px var(--good); }
  .icons { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
    background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--ink-2);
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Card grid: 1-col phone → auto multi-col desktop ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px; padding: 14px;
    position: relative; overflow: hidden;
  }
  .card.paid { border-color: rgba(52,211,153,.35); }
  .card.paid::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(400px 120px at 50% -20%, rgba(52,211,153,.12), transparent 70%);
  }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
  .card-dates { font-size: 11px; color: var(--ink-2); margin-top: 2px; }
  .chip {
    font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px; white-space: nowrap;
    background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--ink-2);
  }
  .chip.ok { color: #04121f; background: linear-gradient(135deg, #34d399, #6ee7b7); border: 0; box-shadow: 0 2px 14px rgba(52,211,153,.3); }

  .hero { margin: 16px 0 4px; }
  .hero .lbl { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; }
  .hero .val { font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin-top: 2px; }
  .hero .val.pos { color: var(--good); }
  .hero .val.neg { color: var(--bad); }
  .hero .of { font-size: 12px; color: var(--ink-2); font-weight: 400; margin-left: 6px; }

  .stats { display: flex; gap: 18px; margin: 12px 0 14px; }
  .stat .lbl { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; }
  .stat .val { font-size: 14px; font-weight: 600; margin-top: 2px; }

  /* segmented allocation bar — 2px gaps, rounded ends */
  .bar { display: flex; gap: 2px; height: 6px; border-radius: 99px; overflow: hidden; background: rgba(148,163,184,.10); }
  .bar span { height: 100%; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 10px; }
  .legend .it { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-2); }
  .legend .sw { width: 7px; height: 7px; border-radius: 2px; }

  .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(148,163,184,.10); font-size: 11px; color: var(--ink-3); }
  .card-foot .view { color: var(--accent-b); font-weight: 600; cursor: pointer; }
  .card { cursor: pointer; transition: transform .15s ease, border-color .15s ease; }
  .card:hover { transform: translateY(-2px); border-color: rgba(34,211,238,.35); }

  /* ── Detail screen ── */
  #screen-detail { display: none; }
  .d-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .d-header .left { display: flex; align-items: center; gap: 12px; }
  .btn-back { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--ink-2); font-size: 16px; }
  .d-title { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
  .d-dates { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .today { text-align: right; }
  .today .lbl { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; }
  .today .val { font-size: 13px; font-weight: 700; background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); -webkit-background-clip: text; background-clip: text; color: transparent; }

  /* stat tiles: 3-up on phone, part of a wider grid on desktop */
  .d-layout { display: grid; gap: 10px; }
  .tiles { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px 14px; }
  .tile { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 12px; }
  .tile .lbl { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile .val { font-size: 19px; font-weight: 800; margin-top: 4px; letter-spacing: -.02em; }
  .tile .sub { font-size: 10px; color: var(--ink-3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .panel { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
  .panel-head .t { font-size: 13px; font-weight: 700; }
  .panel-head .t small { color: var(--ink-3); font-weight: 400; margin-left: 6px; }
  .btn-add { border: 0; cursor: pointer; color: #04121f; font-weight: 700; font-size: 12px; padding: 7px 13px; border-radius: 8px; background: linear-gradient(135deg, #34d399, #6ee7b7); }

  .bill { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: 6px; }
  .bill + .bill { border-top: 1px solid rgba(148,163,184,.10); }
  .bill:hover { background: rgba(148,163,184,.05); }
  .bill .bar-ind { width: 3px; height: 28px; border-radius: 99px; flex-shrink: 0; }
  .bill .info { flex: 1; min-width: 0; }
  .bill .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bill .meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .bill .meta .auto { color: var(--accent-b); }
  .bill .amt { font-size: 14px; font-weight: 700; }
  .bill .tick { width: 26px; height: 26px; border-radius: 99px; border: 1.5px solid var(--card-border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: transparent; cursor: pointer; position: relative; }
  .bill .tick::after { content: ''; position: absolute; inset: -9px; border-radius: 99px; }
  .bill.done .tick { background: linear-gradient(135deg, #34d399, #6ee7b7); border: 0; color: #04121f; }
  .bill.done .name { color: var(--ink-3); text-decoration: line-through; }
  .bill.done .amt { color: var(--ink-3); }

  .due-tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; padding: 2px 6px; border-radius: 4px; vertical-align: 1px; white-space: nowrap; }
  .due-tag.soon { color: #fbbf24; background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.3); }
  .due-tag.over { color: #f87171; background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.35); }

  .filters { display: flex; gap: 6px; margin-bottom: 8px; }
  .fchip { cursor: pointer; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 6px; background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--ink-2); }
  .fchip.on { color: #04121f; background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); border-color: transparent; }

  #toast {
    position: fixed; left: 50%; bottom: 22px; transform: translate(-50%, 70px); z-index: 70;
    background: #16233b; border: 1px solid rgba(34,211,238,.35); color: var(--ink);
    font-size: 12px; padding: 10px 14px; border-radius: 8px; white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); transition: transform .2s ease; pointer-events: auto;
  }
  #toast.show { transform: translate(-50%, 0); }
  #toast button { border: 0; background: transparent; color: var(--accent-b); font-weight: 800; font-size: 12px; margin-left: 10px; cursor: pointer; letter-spacing: .06em; }

  .search { flex: 1; min-width: 0; background: var(--chip-bg); border: 1px solid var(--card-border); border-radius: 8px; color: var(--ink); font-size: 12px; padding: 6px 10px; outline: none; }
  .search::placeholder { color: var(--ink-3); }
  .search:focus { border-color: rgba(34,211,238,.4); }

  /* ── Interaction states (consistent across all controls) ── */
  .btn-new:hover, .btn-add:hover, .btn-save:hover { filter: brightness(1.12); }
  .icon-btn:hover, .btn-back:hover, .fchip:not(.on):hover, .seg button:not(.on):hover, .btn-ghost:hover { border-color: rgba(148,163,184,.35); color: var(--ink); }
  .btn-danger:hover { background: rgba(248,113,113,.16); }
  button:focus-visible, input:focus-visible, .switch:focus-visible { outline: 2px solid rgba(34,211,238,.55); outline-offset: 2px; }

  /* ── Modals ── */
  .overlay { position: fixed; inset: 0; z-index: 60; background: rgba(4,8,16,.7); backdrop-filter: blur(3px); display: flex; align-items: flex-end; justify-content: center; }
  .modal { width: 100%; max-width: 440px; background: linear-gradient(180deg, #131d31, #0c1322); border: 1px solid var(--card-border); border-radius: 12px 12px 0 0; padding: 16px 16px 22px; }
  @media (min-width: 600px) { .overlay { align-items: center; } .modal { border-radius: 12px; } }
  .m-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .m-title { font-size: 16px; font-weight: 800; }
  .m-close { border: 0; background: transparent; color: var(--ink-3); font-size: 18px; cursor: pointer; padding: 2px 6px; }
  .f-lbl { font-size: 10px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; margin: 12px 0 5px; }
  .inp { width: 100%; background: var(--chip-bg); border: 1px solid var(--card-border); border-radius: 8px; color: var(--ink); font-size: 14px; padding: 10px 12px; outline: none; }
  .inp:focus { border-color: rgba(34,211,238,.4); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .seg { display: flex; flex-wrap: wrap; gap: 6px; }
  .seg button { cursor: pointer; font-size: 11px; font-weight: 600; padding: 6px 11px; border-radius: 6px; background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--ink-2); display: flex; align-items: center; gap: 5px; }
  .seg button.on { color: var(--ink); border-color: rgba(34,211,238,.45); background: rgba(34,211,238,.08); }
  .seg .sw { width: 7px; height: 7px; border-radius: 2px; }
  .switch { display: flex; align-items: center; justify-content: space-between; background: var(--chip-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 12px; font-size: 13px; cursor: pointer; }
  .knob { width: 34px; height: 20px; border-radius: 99px; background: rgba(148,163,184,.25); position: relative; transition: background .15s; }
  .knob::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 99px; background: #dfe7f3; transition: left .15s; }
  .switch.on .knob { background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); }
  .switch.on .knob::after { left: 16px; }
  .m-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-save { flex: 1; border: 0; cursor: pointer; color: #04121f; font-weight: 800; font-size: 13px; padding: 12px; border-radius: 8px; background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); }
  .btn-ghost { border: 1px solid var(--card-border); background: transparent; color: var(--ink-2); font-size: 13px; font-weight: 600; padding: 12px 16px; border-radius: 8px; cursor: pointer; }
  .btn-danger { border: 1px solid rgba(248,113,113,.4); background: rgba(248,113,113,.08); color: var(--bad); font-size: 13px; font-weight: 600; padding: 12px 16px; border-radius: 8px; cursor: pointer; }
  .inc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .inc-row .inp { flex: 1; }
  .inc-total { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-2); border-top: 1px solid rgba(148,163,184,.10); padding-top: 10px; margin-top: 4px; }
  .inc-total b { color: var(--good); font-size: 14px; }

  /* desktop: tiles + allocation panel side by side, bills full width */
  @media (min-width: 900px) {
    .d-layout { grid-template-columns: 320px 1fr; align-items: start; }
    .d-side { position: sticky; top: 16px; display: grid; gap: 10px; }
    .tiles { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div id="screen-home">
  <header>
    <div class="brand">
      <h1>PAY<em>CHECKS</em></h1>
      <div class="sub">Fri, Jul 10 · 6 checks</div>
    </div>
    <button class="btn-new">+ New Check</button>
  </header>
  <div class="toolbar">
    <span class="pill"><span class="dot"></span> synced · mr.garnica1</span>
    <div class="icons">
      <button class="icon-btn" title="Import">↓</button>
      <button class="icon-btn" title="Export">↑</button>
      <button class="icon-btn" title="Sign out">⎋</button>
    </div>
  </div>

    <div class="grid" id="grid"></div>
  </div>

  <div id="screen-detail">
    <div class="d-header">
      <div class="left">
        <button class="btn-back" onclick="goHome()">←</button>
        <div>
          <div class="d-title" id="d-title">Check #6</div>
          <div class="d-dates" id="d-dates">Jul 4 → Jul 17</div>
        </div>
      </div>
      <div class="today"><div class="lbl">Today</div><div class="val">Fri, Jul 10</div></div>
    </div>
    <div class="d-layout">
      <div class="d-side">
        <div class="tiles" id="d-tiles"></div>
        <div class="panel">
          <div class="panel-head"><span class="t">Allocation</span></div>
          <div class="bar" id="d-bar"></div>
          <div class="legend" id="d-legend"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="t">Active bills<small id="d-count"></small></span>
          <button class="btn-add" onclick="openBillModal(null)">+ Add Bill</button>
        </div>
        <div class="filters" id="d-filters"></div>
        <div class="filters"><input class="search" id="d-search" placeholder="Search bills…" oninput="q=this.value;renderBills()" /></div>
        <div id="d-bills"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
  const TYPES = [
    ['Loan','var(--t-loan)'], ['CC','var(--t-cc)'], ['Subscription','var(--t-sub)'],
    ['Bills','var(--t-bills)'], ['Investment','var(--t-inv)'],
  ];
  const CHECKS = [
    { n:6, sd:'Jul 4',  ed:'Jul 17', income:5445, alloc:5376, paid:6,  bills:27, all:false, by:{Loan:2650, CC:1730, Subscription:213, Bills:683, Investment:100} },
    { n:5, sd:'Jun 20', ed:'Jul 3',  income:5445, alloc:5082, paid:19, bills:19, all:true,  by:{Loan:2600, CC:1610, Subscription:132, Bills:640, Investment:100} },
    { n:4, sd:'Jun 6',  ed:'Jun 19', income:5445, alloc:5096, paid:26, bills:26, all:true,  by:{Loan:2506, CC:1613, Subscription:236, Bills:641, Investment:100} },
    { n:3, sd:'May 22', ed:'Jun 5',  income:5445, alloc:5153, paid:17, bills:17, all:true,  by:{Loan:2739, CC:1315, Subscription:105, Bills:894, Investment:100} },
    { n:2, sd:'May 9',  ed:'May 22', income:5445, alloc:5405, paid:23, bills:23, all:true,  by:{Loan:3739, CC:915,  Subscription:66,  Bills:585, Investment:100} },
    { n:1, sd:'Apr 24', ed:'May 8',  income:5435, alloc:5391, paid:24, bills:24, all:true,  by:{Loan:3516, CC:1250, Subscription:53,  Bills:472, Investment:100} },
  ];
  // due = days from today (Jul 10) to due date; null = no fixed due day
  const BILLS = [
    { name:'Mortgage',            bank:'Chase',          type:'Loan',         amt:1600, auto:false, paid:false, due:5    },
    { name:'Baby Sitting',        bank:'Schools First',  type:'Bills',        amt:600,  auto:false, paid:false, due:null },
    { name:'Apple Wallet',        bank:'Apple',          type:'CC',           amt:400,  auto:false, paid:true,  due:null },
    { name:'Capital One X (9806)',bank:'Capital One X',  type:'CC',           amt:400,  auto:true,  paid:false, due:1    },
    { name:'MY Car Payment',      bank:'Schools First',  type:'Loan',         amt:500,  auto:true,  paid:true,  due:null },
    { name:'Vanguard',            bank:'Schools First',  type:'Investment',   amt:50,   auto:true,  paid:true,  due:null },
    { name:'SoFi Loan 21k',       bank:'Schools First',  type:'Loan',         amt:250,  auto:true,  paid:false, due:-4   },
    { name:'Sam’s Club',     bank:'Schools First',  type:'CC',           amt:300,  auto:true,  paid:false, due:2    },
    { name:'Tesla Insurance MY',  bank:'Apple',          type:'Bills',        amt:295,  auto:true,  paid:false, due:3    },
    { name:'UFC Monthly Fee',     bank:'Amex',           type:'Subscription', amt:19,   auto:true,  paid:false, due:6    },
    { name:'Netflix',             bank:'Capital One',    type:'Subscription', amt:5,    auto:true,  paid:false, due:null },
    { name:'Robinhood',           bank:'Schools First',  type:'Investment',   amt:50,   auto:true,  paid:true,  due:null },
  ];
  const TCOL = Object.fromEntries(TYPES);
  const INCOME = [{ label: 'Dad', amt: 3106 }, { label: 'Mom', amt: 2339 }];
  let curCheck = null, filter = 'all', q = '';

  function dueTag(b) {
    if (b.paid || b.due === null) return '';
    if (b.due < 0)  return `<span class="due-tag over">overdue ${-b.due}d</span>`;
    if (b.due === 0) return `<span class="due-tag soon">due today</span>`;
    if (b.due <= 3) return `<span class="due-tag soon">due in ${b.due}d</span>`;
    return '';
  }

  function renderTiles() {
    const c = curCheck;
    const leftToPay = BILLS.filter(b => !b.paid).reduce((s, b) => s + b.amt, 0);
    const rem = c.income - c.alloc;
    document.getElementById('d-tiles').innerHTML = `
      <div class="tile"><div class="lbl">Left to pay</div><div class="val" style="color:${leftToPay > 0 ? 'var(--ink)' : 'var(--good)'}">$${leftToPay.toLocaleString()}</div><div class="sub">${BILLS.filter(b => !b.paid).length} unpaid bills</div></div>
      <div class="tile"><div class="lbl">Available</div><div class="val" style="color:${rem >= 0 ? 'var(--good)' : 'var(--bad)'}">$${Math.abs(rem).toLocaleString()}</div><div class="sub">${rem >= 0 ? 'unallocated' : 'over budget'}</div></div>
      <div class="tile" onclick="openIncomeModal()" style="cursor:pointer;"><div class="lbl">Take-home</div><div class="val">$${c.income.toLocaleString()}</div><div class="sub">per check · tap to edit</div></div>`;
  }

  function renderFilters() {
    document.getElementById('d-filters').innerHTML = ['all','unpaid','paid'].map(f =>
      `<button class="fchip ${filter === f ? 'on' : ''}" onclick="filter='${f}';renderBills();renderFilters()">${f[0].toUpperCase() + f.slice(1)}</button>`).join('');
  }

  function renderBills() {
    const needle = q.trim().toLowerCase();
    const idx = BILLS.map((b, j) => j).filter(j =>
      (filter === 'all' || (filter === 'paid') === BILLS[j].paid) &&
      (!needle || (BILLS[j].name + ' ' + BILLS[j].bank).toLowerCase().includes(needle)));
    // unpaid first (most urgent due date on top), paid sink to the bottom
    idx.sort((a, b) => (BILLS[a].paid - BILLS[b].paid) ||
      ((BILLS[a].due ?? 99) - (BILLS[b].due ?? 99)));
    document.getElementById('d-bills').innerHTML = idx.map(j => { const b = BILLS[j]; return `
      <div class="bill ${b.paid ? 'done' : ''}" onclick="openBillModal(${j})">
        <div class="bar-ind" style="background:${TCOL[b.type]}"></div>
        <div class="info">
          <div class="name">${b.name} ${dueTag(b)}</div>
          <div class="meta">${b.bank}${b.auto ? ' · <span class="auto">AUTO</span>' : ''}</div>
        </div>
        <div class="amt">$${b.amt.toLocaleString()}</div>
        <div class="tick" onclick="event.stopPropagation();togglePaid(${j})">✓</div>
      </div>`; }).join('');
    document.getElementById('d-count').textContent = idx.length + ' of ' + curCheck.bills;
  }

  let toastTimer = null;
  function togglePaid(j) {
    const b = BILLS[j];
    b.paid = !b.paid;
    renderBills(); renderTiles();
    const t = document.getElementById('toast');
    t.innerHTML = `${b.name} marked ${b.paid ? 'paid' : 'unpaid'} <button onclick="undoToggle(${j})">UNDO</button>`;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  /* ── Bill add/edit modal ── */
  let editIdx = null, mType = 'Bills', mAuto = false;
  function openBillModal(j) {
    editIdx = j;
    const b = j !== null ? BILLS[j] : { name: '', bank: '', type: 'Bills', amt: '', auto: false, due: null };
    mType = b.type; mAuto = b.auto;
    document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="m-head"><span class="m-title">${j !== null ? 'Edit bill' : 'New bill'}</span><button class="m-close" onclick="closeModal()">✕</button></div>
        <div class="f-lbl">Name</div><input class="inp" id="m-name" value="${b.name}" placeholder="e.g. Electricity" />
        <div class="row2">
          <div><div class="f-lbl">Amount</div><input class="inp" id="m-amt" type="number" inputmode="decimal" value="${b.amt}" placeholder="0" /></div>
          <div><div class="f-lbl">Due day</div><input class="inp" id="m-due" type="number" inputmode="numeric" min="1" max="31" value="${b.due !== null ? 10 + b.due : ''}" placeholder="none" /></div>
        </div>
        <div class="f-lbl">Bank</div><input class="inp" id="m-bank" value="${b.bank}" placeholder="e.g. Chase" />
        <div class="f-lbl">Type</div>
        <div class="seg" id="m-type">${TYPES.map(([t,col]) =>
          `<button class="${mType === t ? 'on' : ''}" onclick="mType='${t}';[...this.parentNode.children].forEach(x=>x.classList.remove('on'));this.classList.add('on')"><span class="sw" style="background:${col}"></span>${t}</button>`).join('')}</div>
        <div class="f-lbl">Autopay</div>
        <div class="switch ${mAuto ? 'on' : ''}" onclick="mAuto=!mAuto;this.classList.toggle('on')"><span>Pays automatically</span><span class="knob"></span></div>
        <div class="m-actions">
          ${j !== null ? '<button class="btn-danger" onclick="deleteBill()">Delete</button>' : ''}
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveBill()">${j !== null ? 'Save' : 'Add bill'}</button>
        </div>
      </div>
    </div>`;
  }
  function saveBill() {
    const name = document.getElementById('m-name').value.trim() || 'Untitled';
    const amt = parseFloat(document.getElementById('m-amt').value) || 0;
    const bank = document.getElementById('m-bank').value.trim();
    const dueRaw = document.getElementById('m-due').value;
    const due = dueRaw === '' ? null : parseInt(dueRaw) - 10; // mock: today is the 10th
    const patch = { name, amt, bank, due, type: mType, auto: mAuto };
    if (editIdx !== null) Object.assign(BILLS[editIdx], patch);
    else BILLS.push(Object.assign({ paid: false }, patch));
    closeModal(); renderBills(); renderTiles();
  }
  function deleteBill() {
    BILLS.splice(editIdx, 1);
    closeModal(); renderBills(); renderTiles();
  }
  function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

  /* ── Income modal ── */
  function openIncomeModal() {
    document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="m-head"><span class="m-title">Take-home per check</span><button class="m-close" onclick="closeModal()">✕</button></div>
        ${INCOME.map((s, k) => `
          <div class="inc-row">
            <input class="inp" value="${s.label}" onchange="INCOME[${k}].label=this.value" />
            <input class="inp" type="number" inputmode="decimal" value="${s.amt}" oninput="INCOME[${k}].amt=parseFloat(this.value)||0;updIncTotal()" />
          </div>`).join('')}
        <div class="inc-total"><span>Total per check</span><b id="inc-total">$${INCOME.reduce((s, x) => s + x.amt, 0).toLocaleString()}</b></div>
        <div class="m-actions">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveIncome()">Save</button>
        </div>
      </div>
    </div>`;
  }
  function updIncTotal() {
    document.getElementById('inc-total').textContent = '$' + INCOME.reduce((s, x) => s + x.amt, 0).toLocaleString();
  }
  function saveIncome() {
    curCheck.income = INCOME.reduce((s, x) => s + x.amt, 0);
    closeModal(); renderTiles();
  }

  function undoToggle(j) {
    BILLS[j].paid = !BILLS[j].paid;
    renderBills(); renderTiles();
    clearTimeout(toastTimer);
    document.getElementById('toast').classList.remove('show');
  }

  function openCheck(i) {
    const c = curCheck = CHECKS[i];
    filter = 'all';
    document.getElementById('d-title').textContent = 'Check #' + c.n;
    document.getElementById('d-dates').textContent = c.sd + ' → ' + c.ed;
    renderTiles(); renderFilters(); renderBills();
    document.getElementById('d-bar').innerHTML = TYPES.filter(([t]) => c.by[t]).map(([t,col]) =>
      `<span style="width:${(c.by[t]/c.income*100).toFixed(1)}%;background:${col}" title="${t} $${c.by[t]}"></span>`).join('');
    document.getElementById('d-legend').innerHTML = TYPES.filter(([t]) => c.by[t]).map(([t,col]) =>
      `<span class="it"><span class="sw" style="background:${col}"></span>${t} $${c.by[t].toLocaleString()}</span>`).join('');
    document.getElementById('screen-home').style.display = 'none';
    document.getElementById('screen-detail').style.display = 'block';
    window.scrollTo(0, 0);
  }
  function goHome() {
    document.getElementById('screen-detail').style.display = 'none';
    document.getElementById('screen-home').style.display = 'block';
  }

  document.getElementById('grid').innerHTML = CHECKS.map(c => {
    const rem = c.income - c.alloc;
    const segs = TYPES.filter(([t]) => c.by[t]).map(([t,col]) =>
      `<span style="width:${(c.by[t]/c.income*100).toFixed(1)}%;background:${col}" title="${t} $${c.by[t]}"></span>`).join('');
    const legend = TYPES.filter(([t]) => c.by[t]).map(([t,col]) =>
      `<span class="it"><span class="sw" style="background:${col}"></span>${t} $${c.by[t].toLocaleString()}</span>`).join('');
    return `
    <div class="card ${c.all ? 'paid' : ''}" onclick="openCheck(${CHECKS.indexOf(c)})">
      <div class="card-top">
        <div>
          <div class="card-title">Check #${c.n}</div>
          <div class="card-dates">${c.sd} → ${c.ed}</div>
        </div>
        <span class="chip ${c.all ? 'ok' : ''}">${c.all ? '✓ All paid' : c.paid + ' / ' + c.bills + ' paid'}</span>
      </div>
      <div class="hero">
        <div class="lbl">Remaining</div>
        <div class="val ${rem >= 0 ? 'pos' : 'neg'}">$${Math.abs(rem).toLocaleString()}<span class="of">of $${c.income.toLocaleString()}</span></div>
      </div>
      <div class="bar">${segs}</div>
      <div class="legend">${legend}</div>
      <div class="stats">
        <div class="stat"><div class="lbl">Income</div><div class="val">$${c.income.toLocaleString()}</div></div>
        <div class="stat"><div class="lbl">Allocated</div><div class="val">$${c.alloc.toLocaleString()}</div></div>
      </div>
      <div class="card-foot"><span>${c.bills} active bills</span><span class="view">View →</span></div>
    </div>`;
  }).join('');
</script>
</body>
</html>
