  function sortInvestments(list, sortBy){
    const s = list.slice();
    if(sortBy==='balance-asc') s.sort((a,b)=>a.balance-b.balance);
    else if(sortBy==='name-asc') s.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==='type-asc') s.sort((a,b)=>a.accountType.localeCompare(b.accountType));
    else s.sort((a,b)=>b.balance-a.balance); // balance-desc, default
    return s;
  }

  function startEditInvestment(id){ const a=app.investments.find(a=>a.id===id); if(!a) return; investUi.editingInvestment=Object.assign({},a); investUi.confirmingDeleteInvestment=false; renderInvestTab(); }

    const ea=investUi.editingInvestment;

      accountType:ACCOUNT_TYPES.indexOf(ea.accountType)>=0?ea.accountType:'Other',
      balance:Math.max(0,Number(ea.balance)||0),
      createdAt:ea.createdAt||toDS(new Date()), history:ea.history||[],

  function makeLoan(){

  function pushLoanHistory(loan){
    const today=toDS(new Date());
    if(!loan.history) loan.history=[];
    const last=loan.history[loan.history.length-1];

  const LOAN_SORTS = [

  function sortLoans(list, sortBy){
    const s = list.slice();
    const pct = l => (l.original && l.original>0) ? (1-(l.balance/l.original))*100 : (l.paid?100:-1);
    if(sortBy==='balance-asc') s.sort((a,b)=>a.balance-b.balance);
    else if(sortBy==='pctpaid-asc') s.sort((a,b)=>pct(a)-pct(b));
    else if(sortBy==='name-asc') s.sort((a,b)=>a.name.localeCompare(b.name));
    else s.sort((a,b)=>b.balance-a.balance); // balance-desc, default
    return s;
  }
  function startNewLoan(){ loanUi.editingLoan=makeLoan(); loanUi.confirmingDeleteLoan=false; renderLoansTab(); }
  function startEditLoan(id){ const l=app.loans.find(l=>l.id===id); if(!l) return; loanUi.editingLoan=Object.assign({},l); loanUi.confirmingDeleteLoan=false; renderLoansTab(); }
  function cancelLoanModal(){ loanUi.editingLoan=null; loanUi.confirmingDeleteLoan=false; renderLoansTab(); }
  function updLoanField(field,value){ if(!loanUi.editingLoan) return; loanUi.editingLoan[field]=value; }
  function saveLoan(){
    const el=loanUi.editingLoan;
    if(!el) return;
    const isNew=!app.loans.find(l=>l.id===el.id);
    const cleaned={
      id:el.id, name:((el.name||'').trim())||'Untitled Loan',
      balance:Math.max(0,Number(el.balance)||0),
      original:(el.original===''||el.original==null)?null:Math.max(0,Number(el.original)||0),
      note:(el.note||'').trim(), paid:!!el.paid,
      createdAt:el.createdAt||toDS(new Date()), history:el.history||[],
    };
    pushLoanHistory(cleaned);
    if(isNew) app.loans.unshift(cleaned);
    else { const idx=app.loans.findIndex(l=>l.id===el.id); if(idx>=0) app.loans[idx]=cleaned; }
    loanUi.editingLoan=null; loanUi.confirmingDeleteLoan=false;
    saveApp(); renderLoansTab();
  }
  function deleteLoan(){
    const el=loanUi.editingLoan;
    if(!el||el.id==null) return;
    if(!loanUi.confirmingDeleteLoan){ loanUi.confirmingDeleteLoan=true; renderLoansTab(); return; }
    app.loans=app.loans.filter(l=>l.id!==el.id);
    loanUi.editingLoan=null; loanUi.confirmingDeleteLoan=false;
    saveApp(); renderLoansTab();
  }

     before keeps whatever shape it was saved with until migrated). Matches by name against the
     canonical seed data so real cards get their real network/owner, not a generic default. */
  function migrateCardFields(){
    if(!app.cards.length) return;
    let changed=false;
    app.cards.forEach(c=>{
      if(c.network && c.owner) return;
      const ref = SEED_CARDS.find(sc=>sc.name===c.name);
      if(!c.network){ c.network = ref ? ref.network : 'Visa'; changed=true; }
      if(!c.owner){ c.owner = ref ? ref.owner : 'You'; changed=true; }

    app.cards.forEach(c=>{ const before=(c.history||[]).length && c.history[c.history.length-1].date===today; pushCardHistory(c); if(!before) changed=true; });

    // Face ID must fire the instant the PIN screen mounts — any async wait here (even a
    // fast local platform check) burns into the browser's transient-user-activation window
    // from opening the app, and some browsers refuse a non-gesture-backed WebAuthn call
    // once that window closes. Availability itself only gates the "Enable Face ID" opt-in
    // link, which is safe to resolve in the background — renderPin() already re-reads it
    // on every keystroke, so the link appears as soon as it's ready without blocking unlock.
    showPinScreen();
    initWebauthnAvailability();
  }
  initCloud();

})();
</script>
</body>
</html>
