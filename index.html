<script>
(function(){

  /* ── PIN lock ──────────────────────────────────────────────── */
  const PIN_CODE = '5247';
  const PIN_SESSION_KEY = 'budget-tracker-pin-v1';

  /* ── Face ID / Touch ID unlock (WebAuthn platform authenticator) ──────────
     Local-device gate only — there's no backend here to verify a signature
     against, so this mirrors the PIN's own trust model (a client-side check),
     just backed by the device's biometric sensor instead of a hardcoded
     4-digit code. PIN always remains the fallback: unsupported browsers, a
     declined enrollment, or a failed/cancelled biometric prompt all fall
     straight through to the same keypad, which is never hidden. ── */
  const WEBAUTHN_CRED_KEY = 'budget-tracker-webauthn-cred-v1';
  const WEBAUTHN_PROMPTED_KEY = 'budget-tracker-webauthn-prompted-v1';
  let webauthnPlatformAvailable = false;
  function bufToB64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
  function b64ToBuf(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)).buffer; }
  function webauthnSupported(){ return !!(window.PublicKeyCredential && navigator.credentials); }
  async function initWebauthnAvailability(){
    try{ webauthnPlatformAvailable = webauthnSupported() && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
    catch(e){ webauthnPlatformAvailable = false; }
  }
  function faceIdEnrolled(){ return !!localStorage.getItem(WEBAUTHN_CRED_KEY); }
  async function enrollFaceId(){
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'Budget Tracker' },
      user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'owner', displayName: 'Budget Tracker' },
      pubKeyCredParams: [{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
      authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
      timeout: 60000,
      attestation: 'none',
    }});
    localStorage.setItem(WEBAUTHN_CRED_KEY, JSON.stringify({ id: bufToB64(cred.rawId) }));
  }
  async function tryFaceUnlock(){
    const stored = JSON.parse(localStorage.getItem(WEBAUTHN_CRED_KEY)||'null');
    if(!stored) return false;
    try{
      const assertion = await navigator.credentials.get({ publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        allowCredentials: [{ id: b64ToBuf(stored.id), type:'public-key', transports:['internal'] }],
        userVerification: 'required',
        timeout: 60000,
      }});
      return !!assertion;
    } catch(e){ return false; }
  }

  function showPinScreen() {
    let entered = '';
    let faceBusy = false;

    function renderPin() {
      const root = document.getElementById('root');
      const enrolled = faceIdEnrolled();
      root.innerHTML = `
        <div style="min-height:100vh;background:#070b14;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;font-family:-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;user-select:none;">
          <div style="width:56px;height:56px;border-radius:50%;border:2px solid #22d3ee;display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
            <svg width="20" height="24" viewBox="0 0 20 24" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="10" width="18" height="13" rx="2"/>
              <path d="M5 10V7a5 5 0 0 1 10 0v3"/>
              <circle cx="10" cy="16.5" r="1.5" fill="#22d3ee" stroke="none"/>
            </svg>
          </div>
          <div class="syne" style="font-size:20px;color:#fff;margin-bottom:5px;">BUDGET <span class="grad-text">TRACKER</span></div>
          <div style="font-size:10px;color:#8b96a8;letter-spacing:.14em;margin-bottom:40px;">ENTER PIN</div>
          <div id="pin-dots" style="display:flex;gap:16px;margin-bottom:44px;">
            ${[0,1,2,3].map(i=>`
              <div style="width:13px;height:13px;border-radius:50%;background:${i<entered.length?'#22d3ee':'transparent'};border:2px solid ${i<entered.length?'#22d3ee':'#3a4354'};transition:all .12s;${i<entered.length?'animation:pin-pop .15s ease;':''}"></div>
            `).join('')}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,76px);gap:10px;">
            ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>
              k===''
                ? `<div></div>`
                : `<button data-key="${k}" style="width:76px;height:76px;border-radius:50%;background:#101827;border:1px solid rgba(148,163,184,.14);color:#eef2f8;font-family:inherit;font-size:${k==='⌫'?'18':'22'}px;cursor:pointer;-webkit-tap-highlight-color:transparent;outline:none;" onpointerdown="this.style.background='rgba(148,163,184,.18)'" onpointerup="this.style.background='#101827'" onpointerleave="this.style.background='#101827'">${k}</button>`
            ).join('')}
          </div>
          <div id="pin-error" style="margin-top:28px;font-size:10px;color:#f87171;letter-spacing:.12em;min-height:14px;opacity:0;transition:opacity .15s;"></div>
          ${enrolled ? `
            <button data-act="use-faceid" style="margin-top:8px;background:transparent;border:none;color:#22d3ee;font-family:inherit;font-size:12px;cursor:pointer;padding:8px;">${faceBusy?'Waiting for Face ID…':'🙂 Use Face ID'}</button>
            <button data-act="reset-faceid" style="margin-top:2px;background:transparent;border:none;color:#3a4354;font-family:inherit;font-size:10px;cursor:pointer;padding:4px;">Reset Face ID</button>
          ` : webauthnPlatformAvailable ? `
            <button data-act="enable-faceid" style="margin-top:12px;background:transparent;border:none;color:#22d3ee;font-family:inherit;font-size:12px;cursor:pointer;padding:8px;">🙂 Enable Face ID</button>
          ` : ''}
        </div>
      `;
      attachPinEvents();
    }

    function attachPinEvents() {
      document.querySelectorAll('[data-key]').forEach(btn=>{
        btn.onclick=()=>handleKey(btn.dataset.key);
      });
      document.onkeydown=e=>{
        if(/^[0-9]$/.test(e.key)) handleKey(e.key);
        else if(e.key==='Backspace') handleKey('⌫');
      };
      const useFaceBtn = document.querySelector('[data-act="use-faceid"]');
      if(useFaceBtn) useFaceBtn.onclick = () => attemptFaceUnlock(false);
      const enableFaceBtn = document.querySelector('[data-act="enable-faceid"]');
      if(enableFaceBtn) enableFaceBtn.onclick = async () => {
        try{ await enrollFaceId(); showToast('✓ Face ID enabled','#34d399'); renderPin(); }
        catch(e){ showToast('✗ Could not enable Face ID','#f87171'); }
      };
      const resetFaceBtn = document.querySelector('[data-act="reset-faceid"]');
      if(resetFaceBtn) resetFaceBtn.onclick = () => { localStorage.removeItem(WEBAUTHN_CRED_KEY); renderPin(); };
    }

    async function attemptFaceUnlock(auto) {
      if(faceBusy) return;
      faceBusy = true;
      if(!auto) renderPin();
      const ok = await tryFaceUnlock();
      faceBusy = false;
      if(ok) unlockNow();
      else if(!auto) renderPin();
    }

    function handleKey(key) {
      if(key==='⌫'){ entered=entered.slice(0,-1); renderPin(); return; }
      if(entered.length>=4) return;
      entered+=key;
      renderPin();
      if(entered.length===4) setTimeout(checkPin, 120);
    }

    function unlockNow(){
      sessionStorage.setItem(PIN_SESSION_KEY,'1');
      document.onkeydown=null;
      loadApp();
      renderApp();
    }

    function showFaceIdPrompt(){
      localStorage.setItem(WEBAUTHN_PROMPTED_KEY,'1');
      const root = document.getElementById('root');
      root.innerHTML += `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;">
          <div style="background:#101827;border:1px solid rgba(148,163,184,.22);border-radius:14px;padding:24px;max-width:320px;width:100%;text-align:center;">
            <div style="font-size:32px;margin-bottom:10px;">🙂</div>
            <div class="syne" style="font-size:16px;color:#fff;margin-bottom:8px;">Enable Face ID?</div>
            <div style="font-size:12px;color:#8b96a8;line-height:1.5;margin-bottom:20px;">Unlock faster next time using this device's Face ID or Touch ID. Your PIN will still work as a backup.</div>
            <button id="faceid-prompt-enable" style="width:100%;background:#22d3ee;border:none;color:#04121f;font-weight:700;padding:11px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;margin-bottom:8px;">Enable Face ID</button>
            <button id="faceid-prompt-skip" style="width:100%;background:transparent;border:1px solid rgba(148,163,184,.22);color:#8b96a8;padding:11px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;">Not Now</button>
          </div>
        </div>
      `;
      document.getElementById('faceid-prompt-enable').onclick = async () => {
        try{ await enrollFaceId(); showToast('✓ Face ID enabled','#34d399'); } catch(e){ showToast('✗ Could not enable Face ID','#f87171'); }
        unlockNow();
      };
      document.getElementById('faceid-prompt-skip').onclick = () => unlockNow();
    }

    function checkPin() {
      if(entered===PIN_CODE){
        document.onkeydown=null;
        if(webauthnPlatformAvailable && !faceIdEnrolled() && !localStorage.getItem(WEBAUTHN_PROMPTED_KEY)) showFaceIdPrompt();
        else unlockNow();
      } else {
        const dots=document.getElementById('pin-dots');
        const err=document.getElementById('pin-error');
        if(dots){
          dots.style.animation='shake .35s ease';
          dots.querySelectorAll('div').forEach(d=>{ d.style.background='#f87171'; d.style.borderColor='#f87171'; });
        }
        if(err){ err.textContent='INCORRECT PIN'; err.style.opacity='1'; }
        setTimeout(()=>{ entered=''; renderPin(); }, 650);
      }
    }

    renderPin();
    if(faceIdEnrolled()) attemptFaceUnlock(true);
  }

  // manualActive: null=auto, true=force-show, false=force-hide

  function isEffectivelyActive(b){ if(b.archived) return false; if(b.manualActive===false) return false; if(b.manualActive===true) return true; return !b.dueDay||!!b.inRange; }
  function toDS(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function shiftDateString(s,days){ return toDS(addD(new Date(s+"T00:00:00"),days)); }
  function fmtD(ds){ return new Date(ds+"T00:00:00").toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function fmtDLong(ds){ return new Date(ds+"T00:00:00").toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  function enrich(bills,s,e){
    return bills.map(b=>{
      if(!b.dueDay) return Object.assign({},b,{inRange:false,nextDue:null});
      const dates=[]; let cur=new Date(s.getFullYear(),s.getMonth(),1);
      const em=new Date(e.getFullYear(),e.getMonth(),1);
      while(cur<=em){
        const mx=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
        const d=new Date(cur.getFullYear(),cur.getMonth(),Math.min(b.dueDay,mx));
        if(d>=s&&d<=e) dates.push(d);
        cur.setMonth(cur.getMonth()+1);
      }
      return Object.assign({},b,{inRange:dates.length>0,nextDue:dates[0]||null});
    });
  }

  function makeCheck() {
    const today = new Date();
    const last = app.checks[0]; // most recent is first (we unshift)
    const id = 'chk-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

    // Copy bills from last check (reset paid/pinned), or use INITIAL_BILLS
    const bills = last
      ? last.bills.map(b => Object.assign({}, b, { paid: false, manualActive: b.archived ? null : (b.manualActive===false?false:null) }))
      : INITIAL_BILLS.map(b => Object.assign({}, b, { planned: Math.round(bwAmt(b)*100)/100, paid: false, archived: !!b.archived, manualActive: null }));

    // Advance dates: start day after last check ends, span 14 days
    const sd = last ? shiftDateString(last.ed, 1) : toDS(today);
    const ed = shiftDateString(sd, 13);

    return {
      id,
      checkN: app.checks.length + 1,
      sd, ed, bills,
      incomeSources: last
        ? JSON.parse(JSON.stringify(last.incomeSources))
        : [{ id: 1, label: 'Dad', amount: 3096 }, { id: 2, label: 'Mom', amount: 2339 }],
      order: last ? [...last.order] : [],
      createdAt: toDS(today),
    };
  }

  function initCloud() {
    try {
      if (typeof firebase === 'undefined') return; // offline / SDK blocked
      firebase.initializeApp(FIREBASE_CONFIG);

      firebase.auth().onAuthStateChanged(user => {
        cloudUser = user;
        if (cloudUnsub) { cloudUnsub(); cloudUnsub = null; }
        cloudDoc = null;
        cloudLoaded = false;
        if (user) {
          cloudDoc = firebase.firestore().collection('budgets').doc(user.uid);
          startCloudListener();
          // Seed: push local ONLY if the cloud doc doesn't exist yet.
          // Never overwrite an existing cloud doc on sign-in — a fresh device
          // with default data must pull from the cloud, not clobber it.
          cloudDoc.get().then(snap => {
            cloudLoaded = true;
            if (!snap.exists) { seededDefaults = false; saveApp(); }
          }).catch(e => console.warn('Cloud seed check failed', e));
        }
        if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') renderApp();
      });
      // Complete a redirect-based sign-in (used on iOS standalone mode)

  function signInCloud() {

    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(e => {
      // Popups are blocked in iOS home-screen (standalone) mode — fall back to redirect
      if (e && (e.code === 'auth/popup-blocked' || e.code === 'auth/operation-not-supported-in-this-environment' || e.code === 'auth/cancelled-popup-request')) {
        firebase.auth().signInWithRedirect(provider);
      } else if (e && e.code !== 'auth/popup-closed-by-user') {

        console.warn('Sign-in failed', e);

  function startCloudListener() {
      cloudUnsub = cloudDoc.onSnapshot(snap => {
        if (!snap.metadata.fromCache) cloudLoaded = true;
        if (!snap.exists || snap.metadata.hasPendingWrites) return;
        const d = snap.data();
        if (!d.json) return;
        let parsed;
        try { parsed = JSON.parse(d.json); } catch(e){ return; }
        if (!parsed.checks || !parsed.checks.length) return;
        // Self-heal: the cloud doc holds template/seed data but this device has real
        // data — re-push ours instead of adopting the seed, repairing the cloud copy.
        if (looksLikeSeed(parsed.checks) && !seededDefaults && app.checks && app.checks.length && !looksLikeSeed(app.checks)) {
          pushCloud();
          return;
        }
        if (!seededDefaults && !(d.updatedAt > lastCloudStamp)) return;
        try {
          lastCloudStamp = d.updatedAt;
          seededDefaults = false;
          applyingRemote = true;
          app.checks = parsed.checks;
          app.cards = parsed.cards || app.cards || [];
          app.investments = parsed.investments || app.investments || [];
          app.loans = parsed.loans || app.loans || [];
          migrateCardFields();
          // Current check may have been deleted remotely
          if (app.currentCheckId && !app.checks.find(c => c.id === app.currentCheckId)) app.currentCheckId = null;
          localStorage.setItem(APP_KEY, JSON.stringify({ checks: app.checks, cards: app.cards, investments: app.investments, loans: app.loans, updatedAt: d.updatedAt }));
          if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') renderApp();
          applyingRemote = false;
          const ind = document.querySelector('[data-cloud-indicator]');
          if (ind) { ind.textContent = '● synced'; ind.style.color = '#34d399'; }
        } catch(e) { applyingRemote = false; console.warn('Cloud apply failed', e); }
      }, err => console.warn('Cloud listener error', err));
  }

  function pushCloud() {
    if (!cloudDoc || applyingRemote) return;
    clearTimeout(cloudPushTimer);
    cloudPushTimer = setTimeout(() => {
      if (!cloudDoc || !cloudLoaded) return; // don't write before we've read the cloud state
      if (seededDefaults) return;            // never overwrite an existing cloud doc with unsynced default data
      const updatedAt = Date.now();
      lastCloudStamp = updatedAt;
      cloudDoc.set({ json: JSON.stringify({ checks: app.checks, cards: app.cards, investments: app.investments, loans: app.loans }), updatedAt })
        .then(() => {

  /* ── Persistence ───────────────────────────────────────────── */
  function saveApp() {
    try { localStorage.setItem(APP_KEY, JSON.stringify({ checks: app.checks, cards: app.cards, investments: app.investments, loans: app.loans, updatedAt: Date.now(), seeded: seededDefaults })); }
    catch(e) { console.warn('Save failed', e); }
    pushCloud();

  function loadApp() {
    try {
      const raw = localStorage.getItem(APP_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.checks && data.checks.length) {
          app.checks = data.checks; app.cards = data.cards || []; app.investments = data.investments || []; app.loans = data.loans || []; lastCloudStamp = data.updatedAt || 0; seededDefaults = !!data.seeded;
          // Recovery for data written by older code without the seeded flag: a single
          // template-shaped check with nothing paid is an unsynced seed, not user data —
          // existing cloud data must win over it.
          if (data.seeded === undefined && data.checks.length === 1 &&
              Array.isArray(data.checks[0].bills) && data.checks[0].bills.length === INITIAL_BILLS.length &&
              data.checks[0].bills.every(b => !b.paid)) seededDefaults = true;
          return;
        }
      }
      // Migrate old single-check format
      const oldRaw = localStorage.getItem(OLD_KEY);
      if (oldRaw) {
        const old = JSON.parse(oldRaw);
        if (old.bills) {
          app.checks = [{
            id: 'chk-migrated',
            checkN: old.checkN || 1,
            sd: old.sd || toDS(new Date()),
            ed: old.ed || toDS(addD(new Date(), 13)),
            bills: old.bills,
            incomeSources: old.incomeSources || [{ id: 1, label: 'Paycheck 1', amount: 5434 }],
            order: old.order || [],
            createdAt: old.sd || toDS(new Date()),
          }];
          return;
        }
      }
    } catch(e) { console.warn('Load failed', e); }
    // First run — create a default check (unsynced seed: existing cloud data must win over it)
    if (app.checks.length === 0) { app.checks = [makeCheck()]; seededDefaults = true; }
    // Migration: archive yearly bills that haven't been migrated
    const archivedIds = new Set(INITIAL_BILLS.filter(b=>b.archived).map(b=>b.id));
    app.checks.forEach(chk=>{ chk.bills.forEach(b=>{ if(b.archived===undefined && archivedIds.has(b.id)) b.archived=true; }); });
    // Migration: apply default pins by name (IDs may differ in old saved data)
    const defaultPinnedNames = new Set(INITIAL_BILLS.filter(b=>b.pinned).map(b=>b.name.toLowerCase().trim()));
    // Migration: convert active field to manualActive
    app.checks.forEach(chk => {
      chk.bills.forEach(b => {
        if (defaultPinnedNames.has((b.name||'').toLowerCase().trim())) b.pinned = true;
        // If bill was explicitly inactive and hasn't been migrated yet, force-hide it
        if (b.manualActive === undefined) {
          b.manualActive = b.active === false ? false : null;
        }
      });
    });
    saveApp();
  }

  /* ── Drag-to-reorder ───────────────────────────────────────── */
  let dragState = null;

  function startBillDrag(e, id, handle) {
    e.stopPropagation(); e.preventDefault();
    const row = handle.closest('[data-row="1"]');
    const list = row.closest('[data-active-list]');
    if (!list) return;
    const rect = row.getBoundingClientRect();
    const content = row.querySelector('[data-content="1"]');
    const ghost = content.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${rect.left+4}px;top:${rect.top}px;width:${rect.width-8}px;pointer-events:none;z-index:500;border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,.7);opacity:.96;transform:scale(1.02);transition:none;`;
    document.body.appendChild(ghost);
    row.style.opacity = '0.2';
    dragState = { id, ghost, row, list, offsetY: e.clientY - rect.top, insertBeforeId: null };
    try { handle.setPointerCapture(e.pointerId); } catch(_) {}
  }

  function moveBillDrag(e) {
    if (!dragState) return;
    dragState.ghost.style.top = (e.clientY - dragState.offsetY) + 'px';
    const rows = Array.from(dragState.list.querySelectorAll('[data-row="1"]'));
    let insertBeforeId = null;
    for (const r of rows) {
      const rid = Number(r.dataset.billId);
      if (rid === dragState.id) continue;
      const rc = r.getBoundingClientRect();
      if (e.clientY < rc.top + rc.height / 2) { insertBeforeId = rid; break; }
    }
    // Update drop indicators
    rows.forEach(r => { const ind = r.querySelector('[data-drop-line]'); if (ind) ind.style.opacity = '0'; });
    if (insertBeforeId !== null) {
      const tr = dragState.list.querySelector(`[data-row="1"][data-bill-id="${insertBeforeId}"]`);
      const ind = tr?.querySelector('[data-drop-line]');
      if (ind) ind.style.opacity = '1';
    }
    dragState.insertBeforeId = insertBeforeId;
  }

  function endBillDrag() {
    if (!dragState) return;
    const { id, ghost, row, list, insertBeforeId } = dragState;
    ghost.remove(); row.style.opacity = '';
    // Clear all drop indicators
    list.querySelectorAll('[data-drop-line]').forEach(el => el.style.opacity = '0');
    // Build new order
    const rows = Array.from(list.querySelectorAll('[data-row="1"]'));
    const ids = rows.map(r => Number(r.dataset.billId)).filter(rid => rid !== id);
    if (insertBeforeId === null) ids.push(id);
    else { const idx = ids.indexOf(insertBeforeId); ids.splice(idx >= 0 ? idx : ids.length, 0, id); }
    state.order = ids;
    dragState = null;
    render();
  }

    const totalIncome = (chk.incomeSources||[]).reduce((s,src)=>s+(Number(src.amount)||0),0);
    // Use same date-range logic as detail view so numbers match
    const start = new Date((chk.sd||toDS(new Date()))+'T00:00:00');
    const end   = new Date((chk.ed||toDS(addD(new Date(),13)))+'T23:59:59');
    const enriched = enrich(chk.bills, start, end);
    const active = enriched.filter(b=>isEffectivelyActive(b));
    const totalAllocated = active.reduce((s,b)=>s+Number(b.planned||0),0);
    const remaining = totalIncome - totalAllocated;
    const paidCount = active.filter(b=>b.paid).length;
    const allPaid = active.length > 0 && paidCount === active.length;
    const byType = {};
    active.forEach(b=>{ byType[b.type]=(byType[b.type]||0)+Number(b.planned||0); });
    return { totalIncome, totalAllocated, remaining, paidCount, activeCount: active.length, allPaid, byType };
  }

  function attachHomeEvents() {
    document.querySelectorAll('[data-act]').forEach(el => {
      const act = el.dataset.act;
      const checkId = el.dataset.checkId;
      if (act === 'add-check') el.onclick = () => addCheck();
      else if (act === 'cloud-signin') el.onclick = () => signInCloud();
      else if (act === 'cloud-signout') el.onclick = () => signOutCloud();
      else if (act === 'export-data') el.onclick = () => exportData();
      else if (act === 'import-data') el.onclick = () => showDataModal('', true);
      else if (act === 'open-check') el.onclick = e => {
        if (e.target.closest('[data-act="delete-check"]')) return;
        navigateTo(checkId);
      };
      else if (act === 'delete-check') el.onclick = e => {
        e.stopPropagation();
        ui.deletingCheckId = checkId;
        renderHome();
      };
      else if (act === 'cancel-delete') el.onclick = e => {
        e.stopPropagation();
        ui.deletingCheckId = null;
        renderHome();
      };
      else if (act === 'confirm-delete') el.onclick = e => {
        e.stopPropagation();
        deleteCheck(checkId);
      };
    });
  }

  function saveBill(){
    if(!state.editingBill) return;
    const eb=state.editingBill, isNew=eb.id==null;
    const cleaned={
      id: isNew?(state.bills.length?Math.max.apply(null,state.bills.map(b=>b.id))+1:1):eb.id,
      name:((eb.name||'').trim())||'Untitled Bill', type:TYPES.indexOf(eb.type)>=0?eb.type:'Bills',
      bank:(eb.bank||'').trim(), baseAmount:Math.max(0,Number(eb.baseAmount)||0),
      frequency:FREQUENCIES.indexOf(eb.frequency)>=0?eb.frequency:'monthly',
      autopay:!!eb.autopay,
      dueDay:(eb.dueDay===''||eb.dueDay==null)?null:Math.max(1,Math.min(31,Number(eb.dueDay)||0)),
      active:!!eb.active, pinned:!!eb.pinned, paid:!!eb.paid,
    };
    let planned=Number(eb.planned);
    if(!eb.plannedTouched||isNaN(planned)||planned<0) planned=Math.round(bwAmt(cleaned)*100)/100;
    cleaned.planned=planned;
    if(isNew) state.bills.push(cleaned);
    else { const idx=state.bills.findIndex(b=>b.id===eb.id); if(idx>=0) state.bills[idx]=cleaned; }
    state.editingBill=null; state.confirmingDelete=false; render();
  }
  function deleteBill(){
    if(!state.editingBill||state.editingBill.id==null) return;
    if(!state.confirmingDelete){ state.confirmingDelete=true; render(); return; }
    const id=state.editingBill.id;
    state.bills=state.bills.filter(b=>b.id!==id);
    state.expandedIds.delete(id);
    state.editingBill=null; state.confirmingDelete=false; render();
  }
  function updEditField(field,value){
    if(!state.editingBill) return;
    state.editingBill[field]=value;
    if(field==='planned') state.editingBill.plannedTouched=true;
    if(state.editingBill.id==null&&(field==='baseAmount'||field==='frequency')&&!state.editingBill.plannedTouched)
      state.editingBill.planned=Math.round(bwAmt(state.editingBill)*100)/100;
    render();
  }

  function dueTagHtml(b){
    if(b.paid||!b.nextDue||!isEffectivelyActive(b)) return '';
    const today=new Date(); today.setHours(0,0,0,0);
    const days=Math.round((b.nextDue-today)/86400000);
    if(days<0) return `<span class="due-tag over">overdue ${-days}d</span>`;
    if(days===0) return `<span class="due-tag soon">due today</span>`;
    if(days<=3) return `<span class="due-tag soon">due in ${days}d</span>`;
    return '';
  }

  /* ── Obsidian sync ─────────────────────────────────────────── */
  function buildMarkdown(){
    const now=new Date();
    const start=new Date(state.sd+'T00:00:00'), end=new Date(state.ed+'T23:59:59');
    const enriched=enrich(state.bills,start,end);
    const activeBills=enriched.filter(b=>b.active);
    const totalAllocated=activeBills.reduce((s,b)=>s+Number(b.planned||0),0);
    const totalInRange=activeBills.filter(b=>b.inRange).reduce((s,b)=>s+Number(b.planned||0),0);
    const remaining=state.income-totalAllocated;
    const paidBills=activeBills.filter(b=>b.paid);
    const paidTotal=paidBills.reduce((s,b)=>s+Number(b.planned||0),0);
    let md=`# Budget Tracker — Check #${state.checkN}\n**Date:** ${now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}\n**Period:** ${fmtDLong(state.sd)} → ${fmtDLong(state.ed)}\n\n## Summary\n| | Amount |\n|---|---|\n| Take-Home | $${state.income.toLocaleString()} |\n| Allocated | $${totalAllocated.toFixed(0)} |\n| Due in Range | $${totalInRange.toFixed(0)} |\n| Remaining | $${Math.abs(remaining).toFixed(0)} ${remaining<0?'⚠️ OVER':'✅'} |\n| Paid So Far | $${paidTotal.toFixed(0)} (${paidBills.length} bills) |\n\n`;
    if(state.incomeSources.length>0){ md+=`## Income Sources\n`; state.incomeSources.forEach(src=>{ md+=`- **${src.label}:** $${Number(src.amount).toLocaleString()}\n`; }); md+='\n'; }
    const byType={};
    activeBills.forEach(b=>{ if(!byType[b.type]) byType[b.type]=[]; byType[b.type].push(b); });
    md+=`## Active Bills\n`;
    Object.entries(byType).forEach(([type,bills])=>{
      md+=`\n### ${type}\n| Bill | Bank | Planned | Due | Paid |\n|---|---|---|---|---|\n`;
      bills.forEach(b=>{ const due=b.nextDue?`${b.nextDue.getMonth()+1}/${b.nextDue.getDate()}`:(b.dueDay?`~${b.dueDay}`:'—'); md+=`| ${b.name}${b.pinned?' 📌':''} | ${b.bank||'—'} | $${b.planned} | ${due} | ${b.paid?'✅':'○'} |\n`; });
    });
    return md;
  }

  async function syncToObsidian(silent=false){
    if(!state) return;
    // Obsidian sync only works inside Cowork — skip silently on GitHub Pages
    if(typeof window.cowork === 'undefined' || typeof window.cowork.callMcpTool !== 'function') return;
    const md=buildMarkdown();
    const filename=`Check-${state.checkN}.md`;
    const folder='Personal Finance/Budget Tracker 2026';
    let toast=null;
    if(!silent){
      toast=document.createElement('div');
      toast.textContent='⟳ Syncing to Obsidian…';
      toast.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(148,163,184,.10);color:#eef2f8;border:1px solid rgba(148,163,184,.22);padding:10px 18px;border-radius:6px;font-size:12px;font-family:inherit;font-weight:500;z-index:9999;white-space:nowrap;';
      document.body.appendChild(toast);
      // Spin the sync button
      const btn=document.querySelector('[data-act="sync-obsidian"]');
      if(btn) btn.style.opacity='0.5';
    }
    try {
      try {
        await window.cowork.callMcpTool('mcp__obsidian__create-note',{vault:'spokeo',filename,folder,content:md});
      } catch(e) {
        await window.cowork.callMcpTool('mcp__obsidian__edit-note',{vault:'spokeo',filename,folder,operation:'replace',content:md});
      }
      if(!silent && toast){
        toast.style.background='#34d399'; toast.style.color='#070b14'; toast.style.border='none';
        toast.textContent=`✓ Synced · spokeo / Personal Finance / Budget Tracker 2026 / ${filename}`;
        setTimeout(()=>toast.remove(),3500);
      }
      // Update last-synced indicator
      const ind=document.querySelector('[data-sync-indicator]');
      if(ind){ const t=new Date(); ind.textContent=`synced ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`; ind.style.color='#34d399'; }
    } catch(err){
      if(!silent && toast){
        toast.style.background='#f87171'; toast.style.color='#070b14'; toast.style.border='none';
        toast.textContent='✗ Obsidian sync failed';
        setTimeout(()=>toast.remove(),3500);
      }
    } finally {
      const btn=document.querySelector('[data-act="sync-obsidian"]');
      if(btn) btn.style.opacity='1';
    }
  }

  function exportMarkdown(){
    const md=buildMarkdown();
    navigator.clipboard.writeText(md).then(()=>{
      const t=document.createElement('div'); t.textContent='✓ Copied to clipboard';
      t.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#34d399;color:#070b14;padding:10px 18px;border-radius:6px;font-size:12px;font-family:inherit;font-weight:600;z-index:9999;white-space:nowrap;';
      document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
    }).catch(()=>{
      const area=document.createElement('textarea'); area.value=md;
      area.style.cssText='position:fixed;top:10%;left:5%;width:90%;height:80%;background:#101827;color:#eef2f8;border:1px solid rgba(148,163,184,.22);border-radius:10px;padding:14px;font-size:12px;font-family:inherit;z-index:9999;';
      document.body.appendChild(area); area.select();
      const close=document.createElement('button'); close.textContent='✕ Close';
      close.style.cssText='position:fixed;top:calc(10% - 36px);right:5%;background:#22d3ee;color:#000;border:none;padding:6px 14px;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;z-index:9999;';
      close.onclick=()=>{ area.remove(); close.remove(); }; document.body.appendChild(close);
    });
  }

    const start=new Date(state.sd+"T00:00:00"), end=new Date(state.ed+"T23:59:59");

    const matchesFilter=b=>{

      return b.name.toLowerCase().includes(state.search.toLowerCase());

    const activeBills=enriched.filter(b=>!b.archived&&isEffectivelyActive(b)&&matchesFilter(b)).sort((a,b)=>{
      if(a.paid!==b.paid) return a.paid?1:-1;

      const ai=state.order.indexOf(a.id), bi=state.order.indexOf(b.id);
      if(ai===-1&&bi===-1) return 0; if(ai===-1) return 1; if(bi===-1) return -1; return ai-bi;

                <div style="font-size:9px;color:#8b96a8;letter-spacing:.1em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.l}</div>
                ${s.ed&&state.editingIncome?'':`<div ${s.ed?'data-act="open-income-modal"':''} class="syne" style="font-size:17px;color:${s.c};white-space:nowrap;${s.ed?'cursor:pointer;':''}">${s.v}${s.ed?'<span style="font-size:8px;color:#8b96a8;margin-left:3px;">✎</span>':''}</div>`}

            </button>
            ${state.searchOpen||state.search?`<input placeholder="Search…" data-act="set-search" data-focus-key="search" value="${escAttr(state.search)}" class="di" style="flex:1;" />`:'<div style="flex:1;"></div>'}
            <div style="display:flex;gap:6px;flex-shrink:0;">
              ${['all','unpaid','paid'].map(f=>`<button data-act="paid-chip" data-filter="${f}" class="fchip ${state.paidFilter===f?'on':''}">${f[0].toUpperCase()+f.slice(1)}</button>`).join('')}

              <div style="font-size:10px;color:#eef2f8;letter-spacing:.08em;font-weight:500;">ACTIVE <span style="color:#8b96a8;margin-left:6px;">${activeBills.length} bills</span></div>
              <div style="display:flex;align-items:center;gap:8px;">
                <button data-act="new-bill" style="background:#34d39914;border:1px solid #34d39955;color:#34d399;padding:3px 10px;border-radius:8px;font-size:10px;font-family:inherit;cursor:pointer;letter-spacing:.05em;">+ ADD BILL</button>
                <div class="syne" style="font-size:13px;color:#22d3ee;">$${totalActive.toFixed(0)}</div>
              </div>

            ${activeBills.length===0?'<div style="padding:20px;text-align:center;color:#3a4354;font-size:11px;border:1px dashed rgba(148,163,184,.18);border-radius:6px;">No active bills</div>':''}
            <div data-active-list>${activeBills.map(b=>billRowHtml(b)).join('')}</div>

          <div style="border:1px dashed rgba(148,163,184,.14);border-radius:10px;padding:10px 10px 6px;background:#0a101d;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-left:4px;">

              <div style="font-size:9px;color:#8b96a8;">swipe right to activate</div>
            </div>
            ${inactiveBills.length===0?'<div style="padding:20px;text-align:center;color:rgba(148,163,184,.22);font-size:11px;border:1px dashed rgba(148,163,184,.10);border-radius:6px;">No inactive bills</div>':''}
            ${inactiveBills.map(b=>billRowHtml(b)).join('')}
          </div>
          ${archivedBills.length>0?`
          <div style="border:1px dashed rgba(148,163,184,.10);border-radius:10px;padding:10px 10px 6px;background:#080d17;margin-top:10px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-left:4px;">
              <div style="font-size:10px;color:#5b6577;letter-spacing:.08em;">🗄️ ARCHIVED <span style="color:#3a4354;margin-left:6px;">${archivedBills.length}</span></div>
              <div style="font-size:9px;color:#3a4354;">tap to unarchive</div>
            </div>
            ${archivedBills.map(b=>billRowHtml(b)).join('')}
          </div>
          `:''}
          <div style="font-size:9px;color:#8b96a8;text-align:center;margin-top:12px;letter-spacing:.07em;">SWIPE RIGHT TO TOGGLE · SWIPE LEFT TO MARK PAID · TAP TO EXPAND</div>
        </div>
      </div>
      ${modalHtml()}
      ${incomeModalHtml()}

    attachDetailEvents();

    if(window._budgetScrollHandler){ window.removeEventListener('scroll',window._budgetScrollHandler,true); document.removeEventListener('scroll',window._budgetScrollHandler,true); }
    if(window._budgetRafId) cancelAnimationFrame(window._budgetRafId);
    function updateScrollHeader(){
      const sh=document.getElementById('scroll-header'), mh=document.getElementById('main-header');
      if(!sh||!mh) return;
      const scrollY=window.scrollY||window.pageYOffset||document.documentElement.scrollTop||0;
      sh.style.top=scrollY>80?Math.max(0,mh.getBoundingClientRect().bottom)+'px':'-80px';
    }
    window._budgetScrollHandler=updateScrollHeader;
    window.addEventListener('scroll',updateScrollHeader,{passive:true});
    document.addEventListener('scroll',updateScrollHeader,{passive:true});
    let lastSY=-1;
    function rafPoll(){ const sy=window.scrollY||0; if(sy!==lastSY){lastSY=sy;updateScrollHeader();} window._budgetRafId=requestAnimationFrame(rafPoll); }
    rafPoll(); updateScrollHeader();

    if(focusKey){
      const el=document.querySelector(`[data-focus-key="${focusKey}"]`);
      if(el){ el.focus(); if(selStart!=null&&'setSelectionRange' in el){ try{el.setSelectionRange(selStart,selEnd);}catch(e){} } }

  function attachDetailEvents(){
    document.querySelectorAll('[data-act]').forEach(el=>{
      const act=el.dataset.act, id=el.dataset.billId?Number(el.dataset.billId):null;
      if(act==='go-home') el.onclick=()=>navigateHome();
      else if(act==='sync-obsidian') el.onclick=()=>syncToObsidian(false);
      else if(act==='export-md') el.onclick=()=>exportMarkdown();
      else if(act==='check-dec') el.onclick=()=>{ if(state.checkN<=1) return; state.checkN--; state.sd=shiftDateString(state.sd,-14); state.ed=shiftDateString(state.ed,-14); render(); };
      else if(act==='check-inc') el.onclick=()=>{ state.checkN++; state.sd=shiftDateString(state.sd,14); state.ed=shiftDateString(state.ed,14); render(); };
      else if(act==='set-sd') el.onchange=e=>{ state.sd=e.target.value; render(); };
      else if(act==='set-ed') el.onchange=e=>{ state.ed=e.target.value; render(); };
      else if(act==='open-income-modal') el.onclick=()=>{ state.editingIncome=true; render(); };
      else if(act==='income-modal-bg') el.onclick=e=>{ if(e.target===el){state.editingIncome=false;render();} };
      else if(act==='income-modal-close') el.onclick=()=>{ state.editingIncome=false; render(); };
      else if(act==='inc-label') el.oninput=e=>{ const i=Number(el.dataset.incIdx); if(state.incomeSources[i]) state.incomeSources[i].label=e.target.value; };
      else if(act==='inc-amount') el.onchange=e=>{ const i=Number(el.dataset.incIdx); if(state.incomeSources[i]){state.incomeSources[i].amount=Number(e.target.value)||0;render();} };
      else if(act==='inc-delete') el.onclick=()=>{ const i=Number(el.dataset.incIdx); if(state.incomeSources.length>1){state.incomeSources.splice(i,1);render();} };
      else if(act==='inc-add') el.onclick=()=>{ state.incomeSources.push({id:Date.now(),label:`Income ${state.incomeSources.length+1}`,amount:0}); render(); };
      else if(act==='toggle-search') el.onclick=()=>{ state.searchOpen=!state.searchOpen; if(!state.searchOpen) state.search=''; render(); };
      else if(act==='set-search') el.oninput=e=>{ state.search=e.target.value; render(); };
      else if(act==='set-paid-filter') el.onchange=e=>{ state.paidFilter=e.target.value; render(); };
      else if(act==='paid-chip') el.onclick=()=>{ state.paidFilter=el.dataset.filter; render(); };
      else if(act==='planned'){
        el.onchange=e=>{ const b=state.bills.find(b=>b.id===id); if(b) b.planned=e.target.value===''?0:Number(e.target.value); render(); };
        el.onclick=e=>e.stopPropagation(); el.onmousedown=e=>e.stopPropagation(); el.onpointerdown=e=>e.stopPropagation();
      }
      else if(act==='expand-row') el.onclick=e=>{ if(e.target&&e.target.closest&&e.target.closest('[data-stop="1"]')) return; state.expandedIds.has(id)?state.expandedIds.delete(id):state.expandedIds.add(id); render(); };
      else if(act==='toggle-paid') el.onclick=e=>{ e.stopPropagation(); const b=state.bills.find(b=>b.id===id); if(b){b.paid=!b.paid;render();showUndoToast(id);} };
      else if(act==='toggle-autopay') el.onclick=e=>{ e.stopPropagation(); const b=state.bills.find(b=>b.id===id); if(b){b.autopay=!b.autopay;render();} };
      else if(act==='toggle-active') el.onclick=e=>{ e.stopPropagation(); const b=state.bills.find(b=>b.id===id); if(b){ const wasActive=el.dataset.effActive==='1'; b.manualActive=wasActive?false:true; render(); } };
      else if(act==='toggle-archive') el.onclick=e=>{ e.stopPropagation(); const b=state.bills.find(b=>b.id===id); if(b){ b.archived=!b.archived; if(!b.archived){ b.manualActive=false; } state.expandedIds.delete(id); render(); } };
      else if(act==='toggle-pin') el.onclick=()=>{ const b=state.bills.find(b=>b.id===id); if(b){b.pinned=!b.pinned;render();} };
      else if(act==='new-bill') el.onclick=()=>startNewBill();
      else if(act==='edit-bill') el.onclick=()=>startEditBill(id);
      else if(act==='modal-bg') el.onclick=e=>{ if(e.target===el) cancelModal(); };
      else if(act==='modal-cancel') el.onclick=()=>cancelModal();
      else if(act==='modal-save') el.onclick=()=>saveBill();
      else if(act==='modal-delete') el.onclick=()=>deleteBill();
      else if(act==='ef-name') el.oninput=e=>updEditField('name',e.target.value);
      else if(act==='ef-bank') el.oninput=e=>updEditField('bank',e.target.value);
      else if(act==='ef-type') el.onchange=e=>updEditField('type',e.target.value);
      else if(act==='ef-freq') el.onchange=e=>updEditField('frequency',e.target.value);
      else if(act==='ef-amount') el.onchange=e=>updEditField('baseAmount',Number(e.target.value)||0);
      else if(act==='ef-planned') el.onchange=e=>updEditField('planned',e.target.value===''?0:Number(e.target.value));
      else if(act==='ef-dueday') el.onchange=e=>updEditField('dueDay',e.target.value===''?null:Number(e.target.value));
      else if(act==='ef-autopay') el.onchange=e=>updEditField('autopay',e.target.checked);
      else if(act==='ef-autopay-toggle') el.onclick=()=>updEditField('autopay',!state.editingBill.autopay);
      else if(act==='ef-active') el.onchange=e=>updEditField('active',e.target.checked);
      else if(act==='ef-active-toggle') el.onclick=()=>updEditField('active',!state.editingBill.active);
      else if(act==='ef-pinned') el.onchange=e=>updEditField('pinned',e.target.checked);
    });
    document.querySelectorAll('[data-stop="1"]').forEach(el=>{ el.onclick=e=>e.stopPropagation(); el.onmousedown=e=>e.stopPropagation(); el.onpointerdown=e=>e.stopPropagation(); });
    document.querySelectorAll('[data-drag-handle]').forEach(handle=>{
      const id=Number(handle.dataset.billId);
      handle.onpointerdown=e=>startBillDrag(e,id,handle);
      handle.onpointermove=e=>moveBillDrag(e);
      handle.onpointerup=()=>endBillDrag();
      handle.onpointercancel=()=>{ if(dragState){dragState.ghost.remove();dragState.row.style.opacity='';dragState=null;} };
    });
    document.querySelectorAll('[data-stop-modal="1"]').forEach(el=>{ el.onclick=e=>e.stopPropagation(); el.onpointerdown=e=>e.stopPropagation(); });

    // Swipe gestures
    document.querySelectorAll('[data-row="1"]').forEach(row=>{
      const id=Number(row.dataset.billId);
      const content=row.querySelector('[data-content="1"]');
      const backdrop=row.querySelector('[data-backdrop="1"]');
      const bdLeft=row.querySelector('[data-backdrop-left="1"]');
      let sX=null,sY=null,dx=0,dy=0,didSwipe=false,locked=null;
      row.onpointerdown=e=>{ const t=e.target; if(!t) return; if(t.closest&&(t.closest('[data-stop="1"]')||t.closest('input,select,button'))) return; sX=e.clientX;sY=e.clientY;dx=0;dy=0;didSwipe=false;locked=null; content.style.transition='none'; if(backdrop) backdrop.style.transition='none'; if(bdLeft) bdLeft.style.transition='none'; try{row.setPointerCapture(e.pointerId);}catch(_){} };
      row.onpointermove=e=>{ if(sX==null) return; dx=e.clientX-sX;dy=e.clientY-sY; if(locked==null){ if(Math.abs(dx)>8||Math.abs(dy)>8) locked=Math.abs(dx)>Math.abs(dy)?'h':'v'; else return; } if(locked==='v') return; if(Math.abs(dx)>16) didSwipe=true;
        if(dx>0){ content.style.transform=`translateX(${Math.max(0,dx)}px)`; if(backdrop){backdrop.style.opacity=Math.min(1,dx/SWIPE_THRESHOLD).toFixed(2);backdrop.style.fontWeight=dx>=SWIPE_THRESHOLD?'700':'500';} if(bdLeft) bdLeft.style.opacity='0'; }
        else{ content.style.transform=`translateX(-${Math.max(0,-dx)}px)`; if(bdLeft){bdLeft.style.opacity=Math.min(1,-dx/SWIPE_THRESHOLD).toFixed(2);bdLeft.style.fontWeight=-dx>=SWIPE_THRESHOLD?'700':'500';} if(backdrop) backdrop.style.opacity='0'; }
      };
      const finish=e=>{ if(sX==null) return; const tr=locked==='h'&&dx>=SWIPE_THRESHOLD, tl=locked==='h'&&dx<=-SWIPE_THRESHOLD; sX=null;sY=null; if(didSwipe) suppressClickUntil=Date.now()+400; try{row.releasePointerCapture(e.pointerId);}catch(_){} content.style.transition='transform .25s ease'; if(backdrop) backdrop.style.transition='opacity .25s ease'; if(bdLeft) bdLeft.style.transition='opacity .25s ease';
        if(tr){ content.style.transform='translateX(110%)'; if(backdrop) backdrop.style.opacity='1'; setTimeout(()=>{ const bill=state.bills.find(b=>b.id===id); if(bill){ const wasActive=row.dataset.effActive==='1'; bill.manualActive=wasActive?false:true; render(); } },230); }
        else if(tl){ content.style.transform='translateX(-110%)'; if(bdLeft) bdLeft.style.opacity='1'; setTimeout(()=>{ const b=state.bills.find(b=>b.id===id); if(b){b.paid=!b.paid;render();showUndoToast(id);} },230); }
        else{ content.style.transform='translateX(0)'; if(backdrop) backdrop.style.opacity='0'; if(bdLeft) bdLeft.style.opacity='0'; }
      };
      row.onpointerup=finish; row.onpointercancel=finish;
    });
  }

  /* ── App router ────────────────────────────────────────────── */
  // Every existing call site of renderApp() (PIN unlock, boot, cloud sync listeners) keeps
  // working unmodified — it just now respects whichever tab is active instead of always
  // assuming Paychecks. None of the ~1400 lines of existing Paychecks/detail-view logic
  // change: their direct renderHome()/render() refresh calls only ever fire from elements
  // that exist while that tab's content is on screen, so they're untouched and correct as-is.
  function renderApp(){
    ensureBottomNav();
    if (activeTab === 'paychecks') {
      if(app.currentCheckId===null){ renderHome(); }
      else { prepareState(); render(); }
    } else if (activeTab === 'overview') {
      renderOverviewTab();
    } else if (activeTab === 'cards') {
      renderCardsTab();
    } else if (activeTab === 'invest') {
      renderInvestTab();
    } else if (activeTab === 'loans') {
      renderLoansTab();
    }
    updateBottomNavActive();
  }

  function setActiveTab(tab){
    if (tab === activeTab) return;
    activeTab = tab;
    renderApp();
  }

  /* ── Bottom tab bar — a sibling of #root, not something re-rendered inside it, so it
     persists untouched across every renderHome()/render() refresh in the existing Paychecks
     code. Created once (idempotent) and only ever shown after PIN unlock, since it's only
     ever created from inside renderApp(). ─────────────────────────────────────────── */
  function ensureBottomNav(){

        <span>Paychecks</span>

  function updateBottomNavActive(){
    document.querySelectorAll('#bottom-nav .bnav-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === activeTab);
    });
  }

  /* ── Overview tab — real data only. Uses the same checkSummary() the home list and detail
     view already use, so these numbers can never drift from what Paychecks itself shows. ── */
  /* ── Overview tile shell — colored eyebrow label + chevron + big number, matching the
     concept shell's .otile treatment. Color lives on the eyebrow (module identity), not the
     number, so the empty state can share the exact same shell with a muted placeholder
     instead of a bare text block. ── */
  function overviewTileHtml({ jump, label, accent, count, num, sub }){
    const isEmpty = count === 0;
    return `
      <div style="margin-top:10px;padding:13px 15px;border:1px solid rgba(148,163,184,.14);border-radius:10px;cursor:pointer;" data-act="ov-go-${jump}">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:${accent};">${label}</div>
          <span style="color:#3a4354;font-size:13px;">→</span>
        </div>
        ${isEmpty
          ? `<div class="syne" style="font-size:21px;margin-top:4px;color:#3a4354;">—</div><div style="font-size:11px;color:#5b6577;margin-top:2px;">Not set up yet — tap to get started</div>`
          : `<div class="syne" style="font-size:21px;margin-top:4px;color:#eef2f8;">${num}</div><div style="font-size:11px;color:#8b96a8;margin-top:2px;">${sub}</div>`}
      </div>
    `;
  }
  function renderOverviewTab(){
    const root = document.getElementById('root');
    const chk = app.checks[0]; // newest check — addCheck() unshifts, so index 0 is current

    const payCard = !chk ? `
      <div style="padding:32px 20px;text-align:center;color:#5b6577;font-size:12px;border:1px dashed rgba(148,163,184,.18);border-radius:10px;">No paychecks yet — head to the Paychecks tab to add one</div>
    ` : (() => {
      const s = checkSummary(chk);
      const over = s.remaining < 0;
      const paidFrac = s.activeCount > 0 ? s.paidCount / s.activeCount : 0;
      const segs = TYPES.filter(t=>s.byType[t]).map(t=>`<div style="height:100%;width:${s.totalIncome>0?Math.min(100,(s.byType[t]/s.totalIncome)*100).toFixed(1):0}%;background:${TC[t]};"></div>`).join('<div style="width:2px;height:100%;background:#070b14;flex-shrink:0;"></div>');
      const legend = TYPES.filter(t=>s.byType[t]).map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#8b96a8;"><span style="width:6px;height:6px;border-radius:2px;background:${TC[t]};"></span>${t} $${s.byType[t].toFixed(0)}</span>`).join('');
      return `
        <div class="check-card" style="cursor:pointer;" data-act="ov-open-check">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:#22d3ee;">This Paycheck</div>
            <span style="color:#3a4354;font-size:13px;">→</span>
          </div>
          <div class="syne" style="font-size:26px;margin-top:6px;color:${over?'#f87171':'#34d399'};">${over?'-':''}$${Math.abs(s.remaining).toLocaleString(undefined,{maximumFractionDigits:0})}<span style="font-size:11px;color:#8b96a8;font-weight:400;margin-left:6px;">of $${s.totalIncome.toLocaleString()}</span></div>
          <div style="font-size:11px;color:#8b96a8;margin-top:2px;">Check #${chk.checkN} · ${fmtD(chk.sd)} → ${fmtD(chk.ed)}</div>
          <div style="margin-top:14px;">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#8b96a8;margin-bottom:6px;">
              <span>${s.paidCount} of ${s.activeCount} bills paid</span>
              <span>${Math.round(paidFrac*100)}%</span>
            </div>
            <div style="height:6px;border-radius:99px;background:rgba(148,163,184,.10);overflow:hidden;"><div style="height:100%;width:${(paidFrac*100).toFixed(0)}%;background:#34d399;"></div></div>
          </div>
          <div style="display:flex;height:6px;border-radius:99px;overflow:hidden;background:rgba(148,163,184,.10);margin:14px 0 8px;">${segs}</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px 14px;">${legend}</div>
        </div>
      `;
    })();

    root.innerHTML = `
      <div style="font-family:-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;background:#070b14;min-height:100vh;color:#eef2f8;padding-bottom:112px;">
        <div style="border-bottom:1px solid rgba(148,163,184,.10);padding:12px 16px 10px;position:sticky;top:0;background:#070b14;z-index:10;">
          <div class="syne" style="font-size:19px;color:#fff;">OVER<span class="grad-text">VIEW</span></div>
          <div style="font-size:10px;color:#8b96a8;letter-spacing:.08em;">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        </div>
        <div style="padding:14px 16px;max-width:700px;margin:0 auto;">
          ${payCard}
          ${overviewTileHtml({ jump:'cards', label:'Credit Cards', accent:'#e8b565', count:app.cards.length,
              num:'$'+app.cards.reduce((s,c)=>s+(Number(c.balance)||0),0).toLocaleString(undefined,{maximumFractionDigits:0}),
              sub:`across ${app.cards.length} card${app.cards.length===1?'':'s'}` })}
          ${overviewTileHtml({ jump:'invest', label:'Investments', accent:'#34d399', count:app.investments.length,
              num:'$'+app.investments.reduce((s,a)=>s+(Number(a.balance)||0),0).toLocaleString(undefined,{maximumFractionDigits:0}),
              sub:`across ${app.investments.length} account${app.investments.length===1?'':'s'}` })}
          ${overviewTileHtml({ jump:'loans', label:'Loans', accent:'#f87171', count:app.loans.length,
              num:'$'+app.loans.filter(l=>!l.paid).reduce((s,l)=>s+(Number(l.balance)||0),0).toLocaleString(undefined,{maximumFractionDigits:0}),
              sub:`across ${app.loans.filter(l=>!l.paid).length} loan${app.loans.filter(l=>!l.paid).length===1?'':'s'}` })}
        </div>
      </div>
    `;
    const openBtn = document.querySelector('[data-act="ov-open-check"]');
    if (openBtn) openBtn.onclick = () => { setActiveTab('paychecks'); navigateTo(chk.id); };
    const cardsBtn = document.querySelector('[data-act="ov-go-cards"]');
    if (cardsBtn) cardsBtn.onclick = () => setActiveTab('cards');
    const investBtn = document.querySelector('[data-act="ov-go-invest"]');
    if (investBtn) investBtn.onclick = () => setActiveTab('invest');
    const loansBtn = document.querySelector('[data-act="ov-go-loans"]');
    if (loansBtn) loansBtn.onclick = () => setActiveTab('loans');
  }

    Streaming:['netflix','hulu','disney','spotify','apple tv','peacock','paramount','amazon prime'],

  function applyCsvImportReview(){

      if(g.action==='skip') return;
      if(g.action==='create'){

        card.name=g.key;
        card.transactions=g.transactions;

      <div data-stop-modal="1" class="modal-card" style="background:#101827;border:1px solid rgba(148,163,184,.22);border-radius:10px;padding:18px;max-width:460px;width:100%;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div style="font-size:11px;letter-spacing:.12em;color:#eef2f8;font-weight:500;">IMPORT REVIEW</div>
          <button data-act="import-review-cancel" style="background:transparent;border:none;color:#5b6577;cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;">✕</button>

        <div style="font-size:10px;color:#8b96a8;margin-bottom:12px;">"${escHtml(ui.filename)}" — ${ui.groups.length} account${ui.groups.length===1?'':'s'} detected. Review the match and suggested balance for each before applying.</div>
        ${rows}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button data-act="import-review-cancel" style="background:transparent;border:1px solid rgba(148,163,184,.22);color:#8b96a8;padding:6px 14px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;">Cancel</button>
          <div style="flex:1;"></div>
          <button data-act="import-review-apply" style="background:#e8b565;border:1px solid #e8b565;color:#070b14;padding:6px 16px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;">Apply Import</button>
        </div>
      </div>
    </div>`;
  }

  let cardUi = { editingCard:null, confirmingDeleteCard:false, viewingCardId:null, confirmingClearAll:false, subTab:'all', ownerFilter:'All', sortBy:'balance-desc' };
  const CARD_SORTS = [
    ['balance-desc','Balance (high to low)'], ['balance-asc','Balance (low to high)'],
    ['apr-desc','APR (high to low)'], ['apr-asc','APR (low to high)'], ['name-asc','Name (A–Z)'],
  ];
  function sortCards(list, sortBy){
    const s = list.slice();
    if(sortBy==='balance-asc') s.sort((a,b)=>a.balance-b.balance);
    else if(sortBy==='apr-desc') s.sort((a,b)=>b.apr-a.apr);
    else if(sortBy==='apr-asc') s.sort((a,b)=>a.apr-b.apr);
    else if(sortBy==='name-asc') s.sort((a,b)=>a.name.localeCompare(b.name));
    else s.sort((a,b)=>b.balance-a.balance); // balance-desc, default
    return s;
  }
  function clearAllCards(){
    if(!app.cards.length) return;
    if(!cardUi.confirmingClearAll){ cardUi.confirmingClearAll=true; renderCardsTab(); return; }
    app.cards=[];
    cardUi.confirmingClearAll=false;
    cardUi.viewingCardId=null; cardUi.editingCard=null; cardUi.confirmingDeleteCard=false;
    saveApp(); renderCardsTab();
    showToast('✓ All cards cleared','#34d399');
  }
  function startNewCard(){ cardUi.editingCard=makeCard(); cardUi.confirmingDeleteCard=false; renderCardsTab(); }
  function startEditCard(id){ const c=app.cards.find(c=>c.id===id); if(!c) return; cardUi.editingCard=Object.assign({},c); cardUi.confirmingDeleteCard=false; renderCardsTab(); }
  function startViewCard(id){ const c=app.cards.find(c=>c.id===id); if(!c) return; cardUi.viewingCardId=id; renderCardsTab(); }
  function closeCardDetail(){ cardUi.viewingCardId=null; renderCardsTab(); }
  function cancelCardModal(){ cardUi.editingCard=null; cardUi.confirmingDeleteCard=false; renderCardsTab(); }
  function updCardField(field,value){ if(!cardUi.editingCard) return; cardUi.editingCard[field]=value; }
  function saveCard(){
    const ec=cardUi.editingCard;
    if(!ec) return;
    const isNew=!app.cards.find(c=>c.id===ec.id);
    const cleaned={
      id:ec.id, name:((ec.name||'').trim())||'Untitled Card', bank:(ec.bank||'').trim(),
      network:CARD_NETWORKS.indexOf(ec.network)>=0?ec.network:'Visa',
      owner:CARD_OWNERS.indexOf(ec.owner)>=0?ec.owner:'You',
      balance:Math.max(0,Number(ec.balance)||0), limit:Math.max(0,Number(ec.limit)||0),
      apr:Math.max(0,Number(ec.apr)||0), minPayment:Math.max(0,Number(ec.minPayment)||0),
      dueDay:(ec.dueDay===''||ec.dueDay==null)?null:Math.max(1,Math.min(31,Number(ec.dueDay)||0)),
      createdAt:ec.createdAt||toDS(new Date()), history:ec.history||[], transactions:ec.transactions||[],
      rewards:Array.isArray(ec.rewards)?ec.rewards.map(s=>(s||'').trim()).filter(Boolean):[],
      perks:Array.isArray(ec.perks)?ec.perks.map(s=>(s||'').trim()).filter(Boolean):[],
      annualFee:Math.max(0,Number(ec.annualFee)||0), highlight:(ec.highlight||'').trim(), warning:(ec.warning||'').trim(),
    };
    pushCardHistory(cleaned);
    if(isNew) app.cards.unshift(cleaned);
    else { const idx=app.cards.findIndex(c=>c.id===ec.id); if(idx>=0) app.cards[idx]=cleaned; }
    cardUi.editingCard=null; cardUi.confirmingDeleteCard=false;
    saveApp(); renderCardsTab();
  }
  function deleteCard(){
    const ec=cardUi.editingCard;
    if(!ec||ec.id==null) return;
    if(!cardUi.confirmingDeleteCard){ cardUi.confirmingDeleteCard=true; renderCardsTab(); return; }
    app.cards=app.cards.filter(c=>c.id!==ec.id);
    cardUi.editingCard=null; cardUi.confirmingDeleteCard=false;
    if(cardUi.viewingCardId===ec.id) cardUi.viewingCardId=null;
    saveApp(); renderCardsTab();
  }

  function cardTransactionsHtml(ec, limit){
    if(!ec.transactions||!ec.transactions.length) return '';
    limit=limit||8;
    const byCat={};
    ec.transactions.forEach(t=>{ if(t.category==='Payment') return; byCat[t.category]=(byCat[t.category]||0)+t.amount; });
    const catChips=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,tot])=>
      `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#8b96a8;margin:2px 10px 2px 0;"><span style="width:6px;height:6px;border-radius:2px;background:${SPEND_CAT_COLOR[cat]||'#8b96a8'};"></span>${escHtml(cat)} $${tot.toFixed(0)}</span>`
    ).join('');
    const rows=ec.transactions.slice(0,limit).map(t=>{
      const isPmt=t.category==='Payment';
      return `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(148,163,184,.08);font-size:11px;">
        <div style="flex:1;min-width:0;">
          <div style="color:#eef2f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.name)}</div>
          <div style="font-size:9px;color:#5b6577;">${escHtml(t.date)}</div>
        </div>
        <span style="font-size:9px;padding:1px 6px;border-radius:99px;background:${SPEND_CAT_COLOR[t.category]||'#8b96a8'}18;color:${SPEND_CAT_COLOR[t.category]||'#8b96a8'};white-space:nowrap;flex-shrink:0;">${escHtml(t.category)}</span>
        <span style="color:${isPmt?'#34d399':'#eef2f8'};flex-shrink:0;">${isPmt?'-':''}$${t.amount.toFixed(2)}</span>
      </div>`;
    }).join('');
    const label=limit>=ec.transactions.length?`TRANSACTIONS (${ec.transactions.length})`:`RECENT TRANSACTIONS (showing ${limit} of ${ec.transactions.length})`;
    return `<div style="margin-top:12px;border-top:1px solid rgba(148,163,184,.14);padding-top:10px;">
      ${catChips?`<div style="font-size:9px;color:#8b96a8;letter-spacing:.08em;margin-bottom:6px;">SPEND BY CATEGORY</div><div style="margin-bottom:10px;">${catChips}</div>`:''}
      <div style="font-size:9px;color:#8b96a8;letter-spacing:.08em;margin-bottom:4px;">${label}</div>
      <div style="max-height:${limit>8?'400px':'200px'};overflow-y:auto;">${rows}</div>
    </div>`;
  }

    const ec=cardUi.editingCard;
    if(!ec) return '';

    return `<div data-act="card-modal-bg" style="position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;">
      <div data-stop-modal="1" class="modal-card" style="background:#101827;border:1px solid rgba(148,163,184,.22);border-radius:10px;padding:18px;max-width:440px;width:100%;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div style="font-size:11px;letter-spacing:.12em;color:#eef2f8;font-weight:500;">${isNew?'+ NEW CARD':'EDIT CARD'}</div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:8px;height:8px;border-radius:99px;background:#c9853e;"></div><button data-act="card-modal-cancel" style="background:transparent;border:none;color:#5b6577;cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;">✕</button></div>
        </div>
        ${field('NAME',`<input type="text" data-act="cf-name" data-focus-key="cf-name" value="${escAttr(ec.name||'')}" placeholder="e.g. Chase Sapphire" class="ef" />`)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${field('BANK',`<input type="text" data-act="cf-bank" data-focus-key="cf-bank" value="${escAttr(ec.bank||'')}" placeholder="e.g. Chase" class="ef" />`)}
          ${field('NETWORK',`<select data-act="cf-network" class="ef">${CARD_NETWORKS.map(n=>`<option value="${n}" ${ec.network===n?'selected':''}>${n}</option>`).join('')}</select>`)}
          ${field('OWNER',`<select data-act="cf-owner" class="ef">${CARD_OWNERS.map(o=>`<option value="${o}" ${ec.owner===o?'selected':''}>${o}</option>`).join('')}</select>`)}
          ${field('DUE DAY (1–31)',`<input type="number" min="1" max="31" data-act="cf-dueday" data-focus-key="cf-dueday" value="${ec.dueDay==null?'':ec.dueDay}" placeholder="—" class="ef" />`)}
          ${field('BALANCE',`<input type="number" min="0" step="0.01" data-act="cf-balance" data-focus-key="cf-balance" value="${ec.balance}" class="ef" />`)}
          ${field('CREDIT LIMIT',`<input type="number" min="0" step="0.01" data-act="cf-limit" data-focus-key="cf-limit" value="${ec.limit}" class="ef" />`)}
          ${field('APR %',`<input type="number" min="0" step="0.01" data-act="cf-apr" data-focus-key="cf-apr" value="${ec.apr}" class="ef" />`)}
          ${field('MIN PAYMENT',`<input type="number" min="0" step="0.01" data-act="cf-minpayment" data-focus-key="cf-minpayment" value="${ec.minPayment}" class="ef" />`)}
          ${field('ANNUAL FEE',`<input type="number" min="0" step="0.01" data-act="cf-annualfee" data-focus-key="cf-annualfee" value="${ec.annualFee||0}" class="ef" />`)}
        </div>
        ${field('HIGHLIGHT',`<input type="text" data-act="cf-highlight" data-focus-key="cf-highlight" value="${escAttr(ec.highlight||'')}" placeholder="e.g. Best for groceries — 3% back" class="ef" />`)}
        ${field('WARNING',`<input type="text" data-act="cf-warning" data-focus-key="cf-warning" value="${escAttr(ec.warning||'')}" placeholder="e.g. High APR — pay in full" class="ef" />`)}
        ${field('REWARDS (one per line)',`<textarea data-act="cf-rewards" data-focus-key="cf-rewards" rows="3" placeholder="e.g. 5% rotating categories&#10;1% everything else" class="ef">${escHtml((ec.rewards||[]).join('\n'))}</textarea>`)}
        ${field('PERKS (one per line)',`<textarea data-act="cf-perks" data-focus-key="cf-perks" rows="3" placeholder="e.g. No annual fee&#10;Free FICO score" class="ef">${escHtml((ec.perks||[]).join('\n'))}</textarea>`)}
        ${cardTransactionsHtml(ec)}
        ${cardUi.confirmingDeleteCard?`<div style="margin-top:10px;padding:8px 10px;border:1px solid #f8717155;background:#f871711a;border-radius:8px;font-size:10px;color:#f87171;letter-spacing:.05em;">This will permanently remove the card. Tap <b>DELETE</b> again to confirm.</div>`:''}
        <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;align-items:center;">
          ${!isNew?`<button data-act="card-modal-delete" style="background:${cardUi.confirmingDeleteCard?'#f87171':'transparent'};border:1px solid ${cardUi.confirmingDeleteCard?'#f87171':'#f8717155'};color:${cardUi.confirmingDeleteCard?'#070b14':'#f87171'};padding:6px 14px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:${cardUi.confirmingDeleteCard?'600':'400'};">${cardUi.confirmingDeleteCard?'CONFIRM DELETE':'Delete'}</button>`:''}
          <div style="flex:1;"></div>
          <button data-act="card-modal-cancel" style="background:transparent;border:1px solid rgba(148,163,184,.22);color:#8b96a8;padding:6px 14px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;">Cancel</button>
          <button data-act="card-modal-save" style="background:#e8b565;border:1px solid #e8b565;color:#070b14;padding:6px 16px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;">${isNew?'Add Card':'Save'}</button>
        </div>
      </div>
    </div>`;

  function attachCardsEvents(){
    document.querySelectorAll('[data-act]').forEach(el=>{
      const act=el.dataset.act, id=el.dataset.cardId||null;
      if(act==='new-card') el.onclick=()=>startNewCard();
      else if(act==='clear-all-cards') el.onclick=()=>clearAllCards();
      else if(act==='load-starter-data') el.onclick=()=>seedMyAccounts();
      else if(act==='edit-card') el.onclick=()=>startEditCard(id);
      else if(act==='view-card') el.onclick=()=>startViewCard(id);
      else if(act==='card-detail-back') el.onclick=()=>closeCardDetail();
      else if(act==='card-detail-edit') el.onclick=()=>startEditCard(id);
      else if(act==='card-modal-bg') el.onclick=e=>{ if(e.target===el) cancelCardModal(); };
      else if(act==='card-modal-cancel') el.onclick=()=>cancelCardModal();
      else if(act==='card-modal-save') el.onclick=()=>saveCard();
      else if(act==='card-modal-delete') el.onclick=()=>deleteCard();
      else if(act==='cf-name') el.oninput=e=>updCardField('name',e.target.value);
      else if(act==='cf-bank') el.oninput=e=>updCardField('bank',e.target.value);
      else if(act==='cf-network') el.onchange=e=>updCardField('network',e.target.value);
      else if(act==='cf-owner') el.onchange=e=>updCardField('owner',e.target.value);
      else if(act==='cf-dueday') el.oninput=e=>updCardField('dueDay',e.target.value===''?null:Number(e.target.value));
      else if(act==='cf-balance') el.oninput=e=>updCardField('balance',e.target.value===''?0:Number(e.target.value));
      else if(act==='cf-limit') el.oninput=e=>updCardField('limit',e.target.value===''?0:Number(e.target.value));
      else if(act==='cf-apr') el.oninput=e=>updCardField('apr',e.target.value===''?0:Number(e.target.value));
      else if(act==='cf-minpayment') el.oninput=e=>updCardField('minPayment',e.target.value===''?0:Number(e.target.value));
      else if(act==='cf-annualfee') el.oninput=e=>updCardField('annualFee',e.target.value===''?0:Number(e.target.value));
      else if(act==='cf-highlight') el.oninput=e=>updCardField('highlight',e.target.value);
      else if(act==='cf-warning') el.oninput=e=>updCardField('warning',e.target.value);
      else if(act==='cf-rewards') el.oninput=e=>updCardField('rewards',e.target.value.split('\n'));
      else if(act==='cf-perks') el.oninput=e=>updCardField('perks',e.target.value.split('\n'));
      else if(act==='import-cards-csv') el.onclick=()=>startImportCardsCsv();
      else if(act==='import-map-select') el.onchange=e=>{ const key=el.dataset.groupKey; const g=cardsImportUi&&cardsImportUi.groups.find(g=>g.key===key); if(g){ g.action=e.target.value; recomputeGroupSuggestion(g); renderCardsTab(); } };
      else if(act==='import-balance-override') el.oninput=e=>{ const key=el.dataset.groupKey; const g=cardsImportUi&&cardsImportUi.groups.find(g=>g.key===key); if(g) g.balanceOverride=e.target.value===''?0:Number(e.target.value); };
      else if(act==='import-review-bg') el.onclick=e=>{ if(e.target===el) cancelCsvImportReview(); };
      else if(act==='import-review-cancel') el.onclick=()=>cancelCsvImportReview();
      else if(act==='import-review-apply') el.onclick=()=>applyCsvImportReview();
    });
    document.querySelectorAll('[data-stop-modal="1"]').forEach(el=>{ el.onclick=e=>e.stopPropagation(); el.onpointerdown=e=>e.stopPropagation(); });
    document.querySelectorAll('[data-cards-tab]').forEach(el=>{
      el.addEventListener('click', ()=>setCardsSubTab(el.dataset.cardsTab));
    });
    const cardsOwnerSel = document.querySelector('[data-act="cards-owner-filter"]');
    if (cardsOwnerSel) cardsOwnerSel.addEventListener('change', e=>{ cardUi.ownerFilter=e.target.value; renderCardsTab(); });
    const cardsSortSel = document.querySelector('[data-act="cards-sort"]');
    if (cardsSortSel) cardsSortSel.addEventListener('change', e=>{ cardUi.sortBy=e.target.value; renderCardsTab(); });
    const payoffExtraInput = document.getElementById('cards-payoff-extra-input');
    if (payoffExtraInput) payoffExtraInput.addEventListener('input', e=>setCardsPayoffExtra(e.target.value, e.target.selectionStart));
    const activeCardsTabBtn = document.querySelector('.cst.on');
    if (activeCardsTabBtn) activeCardsTabBtn.scrollIntoView({ inline:'center', block:'nearest', behavior:'auto' });
    attachCardsSwipe();
  }

  /* ── Payoff Order — real avalanche amortization (highest APR first, freed-up minimums
     roll into the attack fund) — no sentinel-value bugs. Cards without a real minPayment
     set fall back to the documented ~2% of balance (min $25) estimate. ── */
  let cardsPayoffExtra = 200;
  function estimatedMinPayment(c){
    return c.minPayment>0 ? c.minPayment : Math.max(25, Math.round((c.balance||0)*0.02));
  }
  function simulateCardsPayoff(extraPerMonth){
    const state = app.cards.filter(c=>c.balance>0).map(c => ({ id:c.id, bal:c.balance, apr:c.apr, min:estimatedMinPayment(c) }));
    const order = [...state].sort((a,b) => (b.apr - a.apr) || (b.bal - a.bal));
    const payoffMonth = {};
    let months = 0, totalInterest = 0;
    const MAX_MONTHS = 600;
    while (state.some(c => c.bal > 0.5) && months < MAX_MONTHS){
      months++;
      state.forEach(c => { if (c.bal > 0){ const interest = c.bal * (c.apr/100/12); totalInterest += interest; c.bal += interest; } });
      let pool = extraPerMonth;
      state.forEach(c => {
        if (c.bal > 0){ c.bal -= Math.min(c.min, c.bal); }
        else { pool += c.min; } // freed-up minimum joins the attack fund
      });
      for (const c of order){
        if (pool <= 0) break;
        if (c.bal > 0){ const pay = Math.min(pool, c.bal); c.bal -= pay; pool -= pay; }
      }
      state.forEach(c => { if (c.bal <= 0.5 && payoffMonth[c.id] === undefined) payoffMonth[c.id] = months; });
    }
    return { months: months < MAX_MONTHS ? months : null, totalInterest, payoffMonth };
  }

    return `

  /* ── Insights — Debt Over Time chart, built from real per-card/per-loan history
     (forward-filled per date so a card/loan that hasn't been touched on a given date still
     contributes its most recent known balance), plus a mix of one dynamically-computed
     insight (highest-APR-with-balance card) and curated strategy notes. ── */
  function realDebtHistorySeries(){
    const dates = new Set();
    app.cards.forEach(c=>(c.history||[]).forEach(h=>dates.add(h.date)));
    app.loans.forEach(l=>(l.history||[]).forEach(h=>dates.add(h.date)));
    const sortedDates = Array.from(dates).sort();
    return sortedDates.map(date=>{
      let cc=0, loanDebt=0;
      app.cards.forEach(c=>{
        const hist=(c.history||[]).filter(h=>h.date<=date);
        if(hist.length) cc += Number(hist[hist.length-1].balance)||0;
      });
      app.loans.forEach(l=>{
        if(l.paid) return;
        const hist=(l.history||[]).filter(h=>h.date<=date);
        if(hist.length) loanDebt += Number(hist[hist.length-1].balance)||0;
      });
      return { label: fmtD(date), cc, total: cc+loanDebt };
    });
  }
  function debtChartSvg(series){
    const w=340,h=140,pad={l:6,r:6,t:8,b:18};
    const ccVals=series.map(s=>s.cc), totalVals=series.map(s=>s.total);
    const ccMin=Math.min(...ccVals)*0.985, ccMax=Math.max(...ccVals)*1.015;
    const totalMin=Math.min(...totalVals)*0.985, totalMax=Math.max(...totalVals)*1.015;
    const x=i=>pad.l+(i/(series.length-1))*(w-pad.l-pad.r);
    const yCC=v=>h-pad.b-((v-ccMin)/((ccMax-ccMin)||1))*(h-pad.t-pad.b);
    const yTotal=v=>h-pad.b-((v-totalMin)/((totalMax-totalMin)||1))*(h-pad.t-pad.b);
    const path=(vals,yFn)=>vals.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${yFn(v).toFixed(1)}`).join(' ');
    const dots=(vals,yFn,color)=>vals.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${yFn(v).toFixed(1)}" r="3" fill="${color}" stroke="#101827" stroke-width="2"/>`).join('');
    const labels=series.map((s,i)=>`<text x="${x(i).toFixed(1)}" y="${h-2}" font-size="8.5" fill="#5b6577" text-anchor="middle">${escHtml(s.label)}</text>`).join('');
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block;">
      <path d="${path(totalVals,yTotal)}" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <path d="${path(ccVals,yCC)}" fill="none" stroke="#f87171" stroke-width="2"/>
      ${dots(totalVals,yTotal,'#fbbf24')}${dots(ccVals,yCC,'#f87171')}${labels}
    </svg>`;
  }
  function computeCardInsights(){
    const withBalance = app.cards.filter(c=>c.balance>0);
    const highestApr = withBalance.slice().sort((a,b)=>(b.apr-a.apr)||(b.balance-a.balance))[0];
    const insights = [];
    if(highestApr){
      const monthlyInterest = Math.round(highestApr.balance*(highestApr.apr/100/12));
      insights.push({ type:'urgent', typeLabel:'⚠ Urgent', title:`${highestApr.name}: Highest APR`, body:`At ${highestApr.apr}% on $${highestApr.balance.toLocaleString(undefined,{maximumFractionDigits:0})}, you're paying roughly $${monthlyInterest}/mo in interest. This is your #1 payoff target.` });
    }
    insights.push(
      { type:'alert', typeLabel:'⚠ Alert', title:'Venture X Guest Lounge Changed', body:'Guests now pay per-visit at Priority Pass. Free Cap1 Lounge guest access requires $75K spend/yr.' },
      { type:'tip', typeLabel:'💡 Strategy', title:'Use Citi Diamond for Balance Transfer', body:'Move your highest-APR balances onto the empty Citi Diamond Preferred (...1863) for 0% for 21 months — the BT fee is usually far less than the interest you’d otherwise pay.' },
      { type:'tip', typeLabel:'💡 Tip', title:'Venture X Fee Is Effectively $0', body:'$300 travel credit + 10K anniversary miles (~$100) = $400/yr value vs. $395 fee. Net cost ~$0.' },
      { type:'tip', typeLabel:'💡 Action', title:'Enroll in Amex Disney+ Credit', body:'Amex Blue Cash Everyday gives $7/mo ($84/yr) for Disney+/Hulu/ESPN — enrollment required. Activate now.' }
    );
    return insights;
  }
  function renderCardsInsightsSub(){
    const series = realDebtHistorySeries();
    const typeColor = { urgent:'#f87171', alert:'#f87171', tip:'#e8b565' };

  /* ── Swipe left/right anywhere in the Cards sub-nav body to move through CARDS_SUBNAV,
     mirroring the bill-row swipe-to-pay gesture already used in Paychecks: pointerdown/up
     landing on the same element always fires a native click regardless of movement during
     the hold, so a swipe starting on a card tile needs the same click-suppression guard. ── */
  function setCardsSubTab(tab){
    const order = CARDS_SUBNAV.map(([key])=>key);
    cardsSlideDir = tab === cardUi.subTab ? null : (order.indexOf(tab) > order.indexOf(cardUi.subTab) ? 'next' : 'prev');
    cardUi.subTab = tab;

  let cardsSwipeSuppressClickUntil = 0;
  function attachCardsSwipe(){
    const root = document.getElementById('root');
    root.onpointerdown = root.onpointermove = root.onpointerup = root.onpointercancel = null;
    if (!root.querySelector('.cards-subnav')) return;
    let sx=null, sy=null, dx=0, dy=0, locked=null;
    root.onpointerdown = e => {
      const t = e.target;
      if (t.closest && t.closest('input,select,button,.cards-subnav')) return;
      sx=e.clientX; sy=e.clientY; dx=0; dy=0; locked=null;
    };
    root.onpointermove = e => {
      if (sx==null) return;
      dx = e.clientX-sx; dy = e.clientY-sy;
      if (locked==null && (Math.abs(dx)>8||Math.abs(dy)>8)) locked = Math.abs(dx)>Math.abs(dy) ? 'h' : 'v';
    };
    const finish = () => {
      if (sx==null) return;
      if (locked==='h' && Math.abs(dx)>16) cardsSwipeSuppressClickUntil = Date.now()+400;
      if (locked==='h' && Math.abs(dx)>60){
        const order = CARDS_SUBNAV.map(([key])=>key);
        const idx = order.indexOf(cardUi.subTab);
        if (dx<0 && idx<order.length-1) setCardsSubTab(order[idx+1]);
        else if (dx>0 && idx>0) setCardsSubTab(order[idx-1]);
      }
      sx=null; sy=null; locked=null;
    };
    root.onpointerup = finish;
    root.onpointercancel = () => { sx=null; sy=null; locked=null; };
  }

  /* ── Investments — data model + CRUD. Mirrors the Cards module's conventions exactly

  const ACCOUNT_TYPES = ['401k','Roth IRA','Traditional IRA','Brokerage','HSA','Savings','Other'];
  const ACCOUNT_TYPE_COLOR = { '401k':'#34d399', 'Roth IRA':'#22d3ee', 'Traditional IRA':'#3987e5', Brokerage:'#9085e9', HSA:'#2dd4bf', Savings:'#fbbf24', Other:'#8b96a8' };
  function makeInvestment(){
    return { id:'inv-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), name:'', institution:'', accountType:'401k', balance:0, createdAt:toDS(new Date()), history:[] };
  }
  function pushInvestmentHistory(acct){
    const today=toDS(new Date());
    if(!acct.history) acct.history=[];
    const last=acct.history[acct.history.length-1];
    if(last&&last.date===today) last.balance=acct.balance;
    else acct.history.push({ date:today, balance:acct.balance });
  }
  let investUi = { editingInvestment:null, confirmingDeleteInvestment:false, sortBy:'balance-desc' };
